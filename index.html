  ctx.textBaseline = 'top';
  // Charge meter — bottom of screen. Big tiered encouragement text that
  // pops in when it changes, slim glowing progress bar below.
  if (treb.phase === 'cocking') {
    // === Top-center charge badge (always visible, can't be hidden by anything) ===
    {
      const isMobileTop = Math.min(W, H) < 600;
      const fs = isMobileTop ? 36 : 52;
      const padX = 18, padY = 10;
      const pctTxt = `${Math.round(treb.charge * 100)}%`;
      ctx.save();
      ctx.font = `900 ${fs}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const tw = ctx.measureText(pctTxt).width;
      const boxW = tw + padX * 2;
      const boxH = fs + padY * 2;
      const boxX = W / 2 - boxW / 2;
      const boxY = 14;
      ctx.fillStyle = 'rgba(20,14,6,0.55)';
      roundRect(ctx, boxX, boxY, boxW, boxH, 12); ctx.fill();
      // Color the text by tier (white at 0%, gold at 100%, pink at danger)
      const tIdx = trebChargeTier(treb.charge);
      ctx.fillStyle = TREB_CHARGE_TIERS[tIdx].color;
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 6;
      ctx.fillText(pctTxt, W / 2, boxY + padY);
      ctx.restore();
    }
    // === Tier message ===
    const tier = trebChargeTier(treb.charge);
    if (tier !== treb.chargeMsgTier) {
      treb.chargeMsgTier = tier;
      treb.chargeMsgChangedAt = performance.now();
    }
    const tierData = TREB_CHARGE_TIERS[tier];
    const tierAge = (performance.now() - treb.chargeMsgChangedAt) / 1000;
    // Pop animation: overshoot then settle (≈0.5s total)
    let popScale = 1;
    if (tierAge < 0.5) {
      const p = tierAge / 0.5;
      popScale = 1 + Math.sin(p * Math.PI) * 0.32 * (1 - p * 0.5);
    }
    const isMobile = Math.min(W, H) < 600;
    // PERCENTAGE — the big primary number (always centered, color-shifts with tier)
    const pctFontSize = isMobile ? 56 : 80;
    const pctY = isMobile ? H - 92 : H - 110;
    ctx.save();
    ctx.shadowColor = 'rgba(0, 0, 0, 0.75)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = 3;
    ctx.font = `900 ${pctFontSize}px system-ui`;
    ctx.fillStyle = tierData.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.round(treb.charge * 100)}%`, W / 2, pctY);
    // TIER WORD — smaller subtitle below, pops in when it changes
    const tierFontSize = (isMobile ? 18 : 26) * popScale;
    ctx.font = `800 ${tierFontSize}px system-ui`;
    ctx.fillStyle = tierData.color;
    ctx.shadowBlur = 12;
    ctx.fillText(tierData.msg, W / 2, pctY + (isMobile ? 38 : 56));
    ctx.restore();

    // === Slim progress bar — full-width-ish, very bottom of screen ===
    const barW = Math.min(900, W * 0.78);
    const barH = isMobile ? 10 : 14;
    const barX = W / 2 - barW / 2;
    const barY = H - 28;
    // Soft track shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
    roundRect(ctx, barX - 3, barY - 3, barW + 6, barH + 6, barH);
    ctx.fill();
    // Track
    ctx.fillStyle = 'rgba(255, 255, 255, 0.13)';
    roundRect(ctx, barX, barY, barW, barH, barH / 2);
    ctx.fill();
    // Fill (gradient — green → yellow → red)
    const fillRatio = Math.min(1, treb.charge);
    const fillW = barW * fillRatio;
    if (fillW > 1) {
      const cg = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      cg.addColorStop(0, '#6bcf7f');
      cg.addColorStop(0.55, '#ffd93d');
      cg.addColorStop(1, '#ff6b6b');
      ctx.fillStyle = cg;
      roundRect(ctx, barX, barY, fillW, barH, barH / 2);
      ctx.fill();
    }
    // Pulse glow when nearing or past full
    if (treb.charge > 0.85) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 110);
      ctx.save();
      ctx.shadowColor = `rgba(255, 220, 80, ${0.5 + pulse * 0.4})`;
      ctx.shadowBlur = 18 + pulse * 14;
      ctx.fillStyle = `rgba(255, 240, 160, ${0.18 + pulse * 0.22})`;
      roundRect(ctx, barX, barY, fillW, barH, barH / 2);
      ctx.fill();
      ctx.restore();
    }
    // Overcharge band — hot pink streak past 100%
    if (treb.charge > 1.0) {
      const ow = barW * Math.min(0.5, (treb.charge - 1.0) * 0.35);
      const hotG = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      hotG.addColorStop(0, 'rgba(255, 140, 60, 0)');
      hotG.addColorStop(1, 'rgba(255, 80, 220, 0.85)');
      ctx.fillStyle = hotG;
      roundRect(ctx, barX + barW - ow, barY, ow, barH, barH / 2);
      ctx.fill();
    }
  } else if (treb.phase === 'flying') {
    // Distance counter — TOP-CENTER, away from the volume meter (top-left) and
    // gear button (top-right) so neither can ever cover it.
    const isMobile = Math.min(W, H) < 600;
    const fontSize = isMobile ? 36 : 52;
    const padX = 18, padY = 10;
    const txt = `${Math.max(0, Math.round(treb.fx))} mi`;
    ctx.font = `900 ${fontSize}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const tw = ctx.measureText(txt).width;
    const boxW = tw + padX * 2;
    const boxH = fontSize + padY * 2;
    const boxX = W / 2 - boxW / 2;
    const boxY = 14;
    ctx.fillStyle = 'rgba(20,14,6,0.45)';
    roundRect(ctx, boxX, boxY, boxW, boxH, 12); ctx.fill();
    ctx.fillStyle = '#fff8d6';
    ctx.fillText(txt, W / 2, boxY + padY);
  } else if (treb.phase === 'landed') {
    // Result text — for the Mayflower, sit at the top so the ship stays visible.
    // Otherwise center it. Use a soft text-shadow instead of a heavy backdrop box.
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const isMobile = Math.min(W, H) < 600;
    const titleSize = isMobile ? Math.min(56, W * 0.10) : 90;
    const subSize = isMobile ? 18 : 26;
    const titleY = treb.sailing ? Math.max(60, H * 0.10) : H / 2 - 36;
    const subY = titleY + (titleSize * 0.7);
    // drop shadow for legibility against any background
    ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 2;
    ctx.font = `900 ${titleSize}px system-ui`;
    ctx.fillStyle = '#ffd93d';
    if (treb.sailing) {
      ctx.fillText('LANDED ON THE MAYFLOWER!', W / 2, titleY);
      ctx.font = `700 ${subSize}px system-ui`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Set sail for the New World — bon voyage!', W / 2, subY);
    } else {
      ctx.fillText(`${treb.distance} MILES!`, W / 2, titleY);
      ctx.font = `700 ${subSize}px system-ui`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(distanceTagline(treb.distance), W / 2, subY);
    }
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    // "Throw Again" lives on the top-left finish button now.
  }
}

function distanceTagline(ft) {
  if (ft < 500)  return "Eh, the eyeball is fine.";
  if (ft < 900)  return "Nice toss!";
  if (ft < 1400) return "Now we're flying!";
  if (ft < 1900) return "Whoa — way to belt it out!";
  if (ft < 2500) return "POWERFUL singing!";
  if (ft < 3200) return "That eyeball is in low orbit!";
  return "OK, you officially yelled at the moon.";
}

function drawTrebButton(ctx, label, cx, cy, w, h, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 3;
  roundRect(ctx, cx - w/2, cy - h/2, w, h, 14);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = '800 22px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy);
  ctx.restore();
  // Stash hit-rect for click handler
  treb._btnRect = { cx, cy, w, h, label };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

function trebHandleClick(mx, my) {
  if (state.ballMode !== 'trebuchet') return false;
  const r = treb._btnRect;
  if (!r) return false;
  if (mx < r.cx - r.w/2 || mx > r.cx + r.w/2) return false;
  if (my < r.cy - r.h/2 || my > r.cy + r.h/2) return false;
  if (treb.phase === 'cocking' && r.label === 'Release!') { trebFire(); return true; }
  if ((treb.phase === 'landed' || treb.phase === 'broken') && r.label === 'Throw Again') { trebReset(); return true; }
  return false;
}

const COLORS = [
  '#ff6b6b', '#ffd93d', '#6bcf7f', '#4d96ff', '#c780ff',
  '#ff9f43', '#ee5a6f', '#48dbfb', '#1dd1a1', '#feca57',
  '#ff6b9d', '#a29bfe', '#fd79a8', '#00d2d3', '#ff7675'
];

const PHRASES = [
  'LOUDER!', 'SING IT!', 'AMAZING!', 'KEEP GOING!',
  'WONDERFUL!', 'SO GOOD!', 'YEAH!', 'BEAUTIFUL!',
  'WOW!', 'AWESOME!', 'BIGGER!', 'YES!', 'BRAVO!'
];

// ===== Ball class =====
class Ball {
  constructor(x) {
    // Wide size variation — small marbles to big beach balls.
    // Bias toward smaller, with occasional huge ones for variety.
    const t = Math.random();
    // On phones (any side under ~600px), bump everything bigger so the
    // eyeballs are clearly visible and the bouncing reads from across the room.
    const isMobile = Math.min(W, H) < 600;
    const minR = isMobile ? 36 : 14;
    const range = isMobile ? 110 : 95;
    this.radius = minR + Math.pow(t, 1.6) * range;
    this.x = x;
    this.y = H - this.radius;
    this.vx = (Math.random() - 0.5) * 30;
    this.vy = 0;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.color2 = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.squash = 1;       // 1 = round; <1 = compressed (no overshoot/stretch)
    this.rotation = Math.random() * Math.PI * 2;
    this.angVel = (Math.random() - 0.5) * 2;
    this.trail = [];
    this.eyeAngle = 0;
    this.eyeBlink = 0;                       // 0 open → 1 fully closed
    this.idleTime = Math.random() * 5;       // staggered so balls don't blink in sync
    this.dormant = false;  // dormant balls don't react to loudness; they roll off
    this.exitDir = 0;      // -1 = roll off left, +1 = roll off right
    this.splatted = false; // gets removed and replaced
    this.canLaunch = true; // armed → loudness can launch on next floor contact
    this.seed = Math.floor(Math.random() * 100000);
  }

  update(dt, planet, restitution, loudness, mode) {
    // Soap bubbles have completely different physics — they float up, wobble,
    // and pop at the top of the screen. No bouncing, no squash, no trail.
    if (mode === 'soapbubble') {
      // Buoyancy upward, capped, with damping
      this.vy -= 95 * dt;
      this.vy = Math.max(this.vy, -260);
      this.vx += Math.sin(performance.now() * 0.001 + this.seed) * 28 * dt;
      this.vx *= Math.pow(0.985, dt * 60);
      this.vy *= Math.pow(0.992, dt * 60);
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      // Pop at top
      if (this.y + this.radius < -10) this.splatted = true;
      // Soft side bounds (just a gentle wall reflect, no hard bounce)
      if (this.x - this.radius < 0) { this.x = this.radius; this.vx = Math.abs(this.vx) * 0.3; }
      if (this.x + this.radius > W) { this.x = W - this.radius; this.vx = -Math.abs(this.vx) * 0.3; }
      this.squash = 1;
      this.rotation += this.angVel * dt * 0.3;
      return;
    }

    const g = BASE_G * planet.gMul;

    // Gravity (in space, no gravity → balls drift)
    this.vy += g * dt;

    // Drag (water is much draggier)
    this.vx *= Math.pow(planet.drag, dt * 60);
    this.vy *= Math.pow(planet.drag, dt * 60);

    // Position
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Re-arm the loudness-launch as soon as the ball clearly leaves the floor.
    if (this.y + this.radius < H - 1) this.canLaunch = true;

    // Floor collision — THIS is the only place loudness adds energy.
    // Once airborne, the ball completes its trajectory uninterrupted.
    // Uses >= so zero-gravity (Space) balls resting exactly at H - r still
    // enter the block and can be launched by singing.
    if (this.y + this.radius >= H) {
      this.y = H - this.radius;
      const impactSpeed = Math.abs(this.vy);

      // Splat! Fragile ball modes burst on the floor when they hit hard.
      // Threshold still scales with size so tiny ones don't pop on tap-tap.
      // Popcorn is the most fragile (pops on a much softer impact).
      const splattable =
        mode === 'watermelon' || mode === 'eyeball' || mode === 'popcorn';
      const splatBase = mode === 'popcorn' ? 600 : mode === 'eyeball' ? 1300 : 1000;
      const splatThreshold = splatBase + this.radius * 4;
      if (!this.dormant && impactSpeed > splatThreshold && splattable) {
        this.splatted = true;
        splats.push(new Splat(this.x, this.radius, mode, this.color));
        return; // skip the rest of this tick — the ball is gone
      }

      // Sleep threshold scales with gravity-per-frame so a "real impact"
      // means more than what gravity alone would add in one tick. This kills
      // the per-frame micro-bouncing that was driving the squash spring at
      // every tick (visible as ball vibration), especially on heavy planets.
      const sleepThreshold = Math.max(60, g * dt * 2.2);

      // One-shot squash from impact — set directly, never overshoots above 1.
      const impactSquash = Math.max(0.55, 1 - impactSpeed / 1500);

      if (this.dormant) {
        // Dormant balls don't bounce — they settle and roll.
        this.vy = 0;
        if (impactSpeed > 80) this.squash = Math.min(this.squash, Math.max(0.8, impactSquash));
      } else if (impactSpeed > sleepThreshold) {
        // Natural bounce with restitution — preserve rotation across impact
        this.vy = -impactSpeed * restitution;
        this.vx *= 0.96;
        this.angVel *= 0.96;
        if (impactSquash < this.squash) this.squash = impactSquash;
      } else {
        this.vy = 0;
        this.vx *= 0.85;
        this.angVel *= 0.85;
      }

      // Loudness launch — only for active, armed (non-dormant) balls.
      // canLaunch is set false after firing and only re-armed when the ball
      // is clearly airborne again. Without this, sustained ambient noise
      // re-triggered the launch every frame → visible vibration.
      if (loudness > 0.04 && !this.dormant && this.canLaunch) {
        this.canLaunch = false;
        // Per-ball randomization → louder = more chaos, not more sync.
        const variance = 0.35 + loudness * 0.55;
        const lo = Math.max(0.05, loudness * (1 - variance));
        const hi = loudness * (1 + variance * 0.4);
        const ballLoud = lo + Math.random() * (hi - lo);

        if (g > 0.01) {
          const targetHeight = ballLoud * H * 0.95;
          const launchV = Math.sqrt(2 * g * targetHeight);
          if (-this.vy < launchV) this.vy = -launchV;
          this.vx += (Math.random() - 0.5) * loudness * 900;
          const ls = Math.max(0.55, 0.65 - ballLoud * 0.1);
          if (ls < this.squash) this.squash = ls;
        } else {
          const speed = 200 + ballLoud * 1800;
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.1;
          this.vx += Math.cos(angle) * speed * 0.6;
          this.vy = Math.sin(angle) * speed;
          if (0.6 < this.squash) this.squash = 0.6;
        }
      }
    }
    // Ceiling — pure elastic-ish bounce, no loudness coupling
    if (this.y - this.radius < 0) {
      this.y = this.radius;
      this.vy = Math.abs(this.vy) * restitution;
    }
    // Dormant drift — gentle nudge toward the exit side so they roll off.
    if (this.dormant && this.exitDir) {
      const targetVx = this.exitDir * 130;
      this.vx += (targetVx - this.vx) * Math.min(1, dt * 1.6);
    }

    // Walls — pure bounce, no loudness coupling.
    // Dormant balls leave the screen on their assigned exit side.
    if (this.x - this.radius < 0 && !(this.dormant && this.exitDir < 0)) {
      this.x = this.radius;
      this.vx = Math.abs(this.vx) * restitution;
      this.angVel = -this.angVel;
    }
    if (this.x + this.radius > W && !(this.dormant && this.exitDir > 0)) {
      this.x = W - this.radius;
      this.vx = -Math.abs(this.vx) * restitution;
      this.angVel = -this.angVel;
    }

    // Squash recovery — simple smooth ease back to 1.
    // No overshoot, no oscillation. The ball can only be compressed (≤1).
    if (this.squash < 1) {
      this.squash += (1 - this.squash) * Math.min(1, dt * 14);
      if (this.squash > 0.999) this.squash = 1;
    }

    // Rotation
    this.rotation += this.angVel * dt;

    // Eye behavior — when at rest, slowly drift the gaze around and
    // blink occasionally. While moving, look toward direction of travel.
    const speed = Math.hypot(this.vx, this.vy);
    const onFloor = this.y + this.radius >= H - 2;
    const resting = onFloor && speed < 30 && !this.dormant;
    let targetEyeAngle;
    if (resting) {
      this.idleTime += dt;
      const tt = this.idleTime;
      const dx = Math.sin(tt * 0.6 + this.seed * 0.013);
      const dy = Math.cos(tt * 0.42 + this.seed * 0.027) * 0.55;
      targetEyeAngle = Math.atan2(dy, dx);
      // Per-ball blink cadence (~3.5s..6.5s) so they don't blink in unison
      const blinkPeriod = 3.5 + ((this.seed * 7) % 30) / 10;
      const phase = tt % blinkPeriod;
      const blinkDur = 0.16;
      this.eyeBlink = phase < blinkDur ? Math.sin((phase / blinkDur) * Math.PI) : 0;
    } else {
      targetEyeAngle = Math.atan2(this.vy, this.vx);
      this.eyeBlink = 0;
    }
    let diff = targetEyeAngle - this.eyeAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    this.eyeAngle += diff * Math.min(1, dt * (resting ? 1.6 : 6));

    // Trail
    this.trail.push({ x: this.x, y: this.y, r: this.radius });
    if (this.trail.length > 8) this.trail.shift();
  }

  draw(ctx, mode) {
    // Soap bubbles: no trail, no ground shadow, no rotation/squash transform —
    // just a translucent disk drawn at the ball's position.
    if (mode === 'soapbubble') {
      ctx.save();
      ctx.translate(this.x, this.y);
      drawBall(ctx, this.radius, this.color, this.color2, mode, this.eyeAngle, this.rotation, this.seed, this.eyeBlink);
      ctx.restore();
      return;
    }

    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = (i / this.trail.length) * 0.18;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Ground shadow — bigger and softer when ball is high; tight and dark when near floor.
    const heightAboveFloor = Math.max(0, (H - this.radius) - this.y);
    const closeness = 1 - Math.min(1, heightAboveFloor / 600); // 1 near floor, 0 high up
    const shAlpha = 0.12 + 0.32 * closeness;
    const shScaleX = 0.65 + 0.45 * closeness;
    const shScaleY = 0.18 + 0.12 * closeness;
    ctx.save();
    ctx.translate(this.x, H - 2);
    const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
    sg.addColorStop(0, `rgba(0,0,0,${shAlpha})`);
    sg.addColorStop(0.65, `rgba(0,0,0,${shAlpha * 0.45})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.radius * shScaleX, this.radius * shScaleY, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    // Subtle deformation: vertical squash with mild horizontal stretch.
    // No oval-look mid-air — when squash is 1, both axes are 1.
    const sy = this.squash;
    const sx = 1 + (1 - this.squash) * 0.45;
    // Anchor the ball to its bottom (the contact point) so a compressed ball
    // "sits down" on the floor instead of floating as a flatter ellipse.
    ctx.translate(this.x, this.y + this.radius * (1 - sy));
    ctx.scale(sx, sy);
    // For face-y modes, don't rotate (faces stay upright); for spinning modes, rotate
    const rotates = mode === 'classic' || mode === 'soccer' ||
                    mode === 'tennis' || mode === 'watermelon' ||
                    mode === 'popcorn';
    if (rotates) ctx.rotate(this.rotation);

    drawBall(ctx, this.radius, this.color, this.color2, mode, this.eyeAngle, this.rotation, this.seed, this.eyeBlink);

    ctx.restore();
  }
}

// ===== Per-mode drawing =====
function drawBall(ctx, r, color, color2, mode, eyeAngle, rotation, seed = 0, eyeBlink = 0) {
  if (mode === 'classic') {
    // Layered radial: bright highlight tint, body color, deeper rim color
    const grad = ctx.createRadialGradient(-r * 0.4, -r * 0.45, r * 0.05, -r * 0.1, -r * 0.05, r * 1.1);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.18, lighten(color, 0.35));
    grad.addColorStop(0.55, color);
    grad.addColorStop(1, darken(color, 0.45));
    ctx.fillStyle = grad;
    circle(ctx, 0, 0, r);
    addShine(ctx, r);
  }
  else if (mode === 'soccer') {
    ctx.fillStyle = '#ffffff';
    circle(ctx, 0, 0, r);
    // Black pentagons (simplified as 6 dots around)
    ctx.fillStyle = '#111';
    const pent = (cx, cy, pr) => {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
        const px = cx + Math.cos(a) * pr;
        const py = cy + Math.sin(a) * pr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    };
    pent(0, 0, r * 0.28);
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      pent(Math.cos(a) * r * 0.6, Math.sin(a) * r * 0.6, r * 0.2);
    }
    ctx.strokeStyle = '#222';
    ctx.lineWidth = Math.max(1, r * 0.04);
    circle(ctx, 0, 0, r, true);
    addShine(ctx, r, 0.7);
  }
  else if (mode === 'tennis') {
    // Felt-like gradient
    const grad = ctx.createRadialGradient(-r * 0.4, -r * 0.45, r * 0.05, -r * 0.1, -r * 0.05, r * 1.1);
    grad.addColorStop(0, '#f1ff85');
    grad.addColorStop(0.5, '#d4ff3a');
    grad.addColorStop(1, '#7a9410');
    ctx.fillStyle = grad;
    circle(ctx, 0, 0, r);
    // fuzzy felt speckle
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.clip();
    ctx.fillStyle = 'rgba(255,255,200,0.35)';
    for (let i = 0; i < 80; i++) {
      const a = Math.random() * Math.PI * 2;
      const rr = Math.sqrt(Math.random()) * r;
      circle(ctx, Math.cos(a) * rr, Math.sin(a) * rr, 0.4 + Math.random() * 0.8);
    }
    ctx.restore();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(1.5, r * 0.08);
    ctx.lineCap = 'round';
    // Curved seams
    ctx.beginPath();
    ctx.arc(-r * 0.7, 0, r * 1.0, -Math.PI / 3, Math.PI / 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r * 0.7, 0, r * 1.0, Math.PI - Math.PI / 3, Math.PI + Math.PI / 3);
    ctx.stroke();
    addShine(ctx, r, 0.7);
  }
  else if (mode === 'watermelon') {
    // Pink flesh
    ctx.fillStyle = '#ff5c8a';
    circle(ctx, 0, 0, r);
    // Inner light pink ring
    ctx.fillStyle = '#ff85a8';
    circle(ctx, 0, 0, r * 0.85);
    ctx.fillStyle = '#ff5c8a';
    circle(ctx, 0, 0, r * 0.78);
    // Seeds
    ctx.fillStyle = '#1a1a1a';
    const seeds = 8;
    for (let i = 0; i < seeds; i++) {
      const a = (i / seeds) * Math.PI * 2;
      const sr = r * 0.5;
      ctx.save();
      ctx.translate(Math.cos(a) * sr, Math.sin(a) * sr);
      ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.06, r * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Green rind ring
    ctx.strokeStyle = '#2eb84a';
    ctx.lineWidth = r * 0.14;
    circle(ctx, 0, 0, r * 0.93, true);
    ctx.strokeStyle = '#0f5c1f';
    ctx.lineWidth = r * 0.05;
    circle(ctx, 0, 0, r * 0.99, true);
    addShine(ctx, r, 0.6);
  }
  else if (mode === 'eyeball') {
    // White sclera
    const grad = ctx.createRadialGradient(-r * 0.2, -r * 0.2, r * 0.1, 0, 0, r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#e8e8f0');
    ctx.fillStyle = grad;
    circle(ctx, 0, 0, r);
    // Red veins
    ctx.strokeStyle = 'rgba(220, 50, 50, 0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + 0.3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r * 0.95, Math.sin(a) * r * 0.95);
      ctx.quadraticCurveTo(
        Math.cos(a + 0.2) * r * 0.6, Math.sin(a + 0.2) * r * 0.6,
        Math.cos(a + 0.1) * r * 0.4, Math.sin(a + 0.1) * r * 0.4
      );
      ctx.stroke();
    }
    // Iris (looks toward velocity, or drifts when at rest)
    const lookOffset = r * 0.35;
    const lx = Math.cos(eyeAngle) * lookOffset;
    const ly = Math.sin(eyeAngle) * lookOffset;
    // Blink — vertically squish the iris/pupil/catchlight around their center
    const openY = Math.max(0.04, 1 - eyeBlink);
    ctx.save();
    ctx.translate(lx, ly);
    ctx.scale(1, openY);
    ctx.translate(-lx, -ly);
    ctx.fillStyle = color;
    circle(ctx, lx, ly, r * 0.42);
    const iris = ctx.createRadialGradient(lx, ly, r * 0.05, lx, ly, r * 0.42);
    iris.addColorStop(0, color);
    iris.addColorStop(0.7, color);
    iris.addColorStop(1, '#000000');
    ctx.fillStyle = iris;
    circle(ctx, lx, ly, r * 0.42);
    ctx.fillStyle = '#000';
    circle(ctx, lx, ly, r * 0.2);
    ctx.fillStyle = '#fff';
    circle(ctx, lx - r * 0.08, ly - r * 0.08, r * 0.06);
    ctx.restore();
    // Eyelid line at the height of the closing eye (only visible mid-blink)
    if (eyeBlink > 0.4) {
      ctx.strokeStyle = `rgba(40, 22, 12, ${Math.min(1, (eyeBlink - 0.4) * 1.7)})`;
      ctx.lineWidth = r * 0.06;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-r * 0.78, ly);
      ctx.lineTo(r * 0.78, ly);
      ctx.stroke();
    }
    // Wet sclera shine over the whole eyeball
    addShine(ctx, r, 0.55);
  }
  else if (mode === 'popcorn') {
    // Popcorn — irregular cluster of fluffy lobes around a kernel core.
    // Per-piece variety driven by `seed` so each puff looks different.
    const rng = srand(seed + 1);
    const lobes = 5 + Math.floor(rng() * 3);
    const lobeData = [];
    for (let i = 0; i < lobes; i++) {
      const a = (i / lobes) * Math.PI * 2 + rng() * 0.5;
      const dist = r * (0.35 + rng() * 0.25);
      const lr = r * (0.42 + rng() * 0.22);
      lobeData.push({ x: Math.cos(a) * dist, y: Math.sin(a) * dist, r: lr });
    }

    // Soft underside shadow (offset down)
    ctx.fillStyle = 'rgba(170, 130, 70, 0.35)';
    ctx.beginPath();
    for (const L of lobeData) {
      ctx.moveTo(L.x + L.r, L.y + r * 0.1);
      ctx.arc(L.x, L.y + r * 0.1, L.r * 1.02, 0, Math.PI * 2);
    }
    ctx.fill();

    // Cream body
    ctx.fillStyle = '#fff5d8';
    ctx.beginPath();
    for (const L of lobeData) {
      ctx.moveTo(L.x + L.r, L.y);
      ctx.arc(L.x, L.y, L.r, 0, Math.PI * 2);
    }
    ctx.fill();

    // Bright sunlit top
    ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
    ctx.beginPath();
    for (const L of lobeData) {
      const tr = L.r * 0.62;
      ctx.moveTo(L.x + tr, L.y - r * 0.08);
      ctx.arc(L.x - r * 0.05, L.y - r * 0.08, tr, 0, Math.PI * 2);
    }
    ctx.fill();

    // Buttery yellow accents (random small patches)
    ctx.fillStyle = 'rgba(255, 200, 80, 0.55)';
    for (let i = 0; i < 4; i++) {
      const L = lobeData[Math.floor(rng() * lobeData.length)];
      const a = rng() * Math.PI * 2;
      const d = rng() * L.r * 0.5;
      circle(ctx, L.x + Math.cos(a) * d, L.y + Math.sin(a) * d, L.r * 0.18);
    }

    // Brown kernel hint somewhere near center
    ctx.fillStyle = '#5a2e0c';
    const kAng = rng() * Math.PI * 2;
    const kx = Math.cos(kAng) * r * 0.18;
    const ky = Math.sin(kAng) * r * 0.18;
    ctx.beginPath();
    ctx.ellipse(kx, ky, r * 0.10, r * 0.07, rng() * Math.PI, 0, Math.PI * 2);
    ctx.fill();

    // Tiny pinpoint highlight on the brightest lobe
    const top = lobeData.reduce((a, b) => a.y < b.y ? a : b);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    circle(ctx, top.x - top.r * 0.25, top.y - top.r * 0.45, top.r * 0.18);
  }
  else if (mode === 'soapbubble') {
    // Translucent soap bubble with iridescent color hints and a bright catchlight.
    ctx.save();
    // Body — very subtle gradient, mostly transparent
    const body = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.05, 0, 0, r);
    body.addColorStop(0, 'rgba(255, 255, 255, 0.32)');
    body.addColorStop(0.55, 'rgba(190, 230, 255, 0.10)');
    body.addColorStop(0.85, 'rgba(160, 200, 255, 0.18)');
    body.addColorStop(1, 'rgba(140, 190, 255, 0.30)');
    ctx.fillStyle = body;
    circle(ctx, 0, 0, r);

    // Iridescent color smears (rainbow oil-slick look)
    ctx.globalCompositeOperation = 'screen';
    const sheen = (cx, cy, sr, c) => {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, sr);
      g.addColorStop(0, c + '80');
      g.addColorStop(0.6, c + '20');
      g.addColorStop(1, c + '00');
      ctx.fillStyle = g;
      circle(ctx, cx, cy, sr);
    };
    sheen( r * 0.25,  r * 0.20, r * 0.55, '#ff9eea');
    sheen(-r * 0.30,  r * 0.10, r * 0.55, '#9eeaff');
    sheen( r * 0.10, -r * 0.30, r * 0.50, '#fff09e');
    sheen(-r * 0.10,  r * 0.35, r * 0.45, '#9effbf');
    ctx.globalCompositeOperation = 'source-over';

    // Outer rim line (thin, bright)
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.lineWidth = Math.max(1, r * 0.04);
    circle(ctx, 0, 0, r * 0.97, true);
    // Inner rim glow
    ctx.strokeStyle = 'rgba(180, 220, 255, 0.35)';
    ctx.lineWidth = Math.max(0.6, r * 0.015);
    circle(ctx, 0, 0, r * 0.92, true);

    // Bright catchlight on the upper-left (large soft + tight pinpoint)
    const cl = ctx.createRadialGradient(-r * 0.42, -r * 0.42, 0, -r * 0.42, -r * 0.42, r * 0.42);
    cl.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
    cl.addColorStop(0.5, 'rgba(255, 255, 255, 0.25)');
    cl.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = cl;
    circle(ctx, -r * 0.42, -r * 0.42, r * 0.42);
    // Tiny crescent reflection on the lower-right
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.lineWidth = Math.max(1, r * 0.05);
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.85, 0.25, 1.0);
    ctx.stroke();
    ctx.restore();
  }

  // Storybook hand-drawn outline — stamps a wobbly ink line around every
  // ball. Skipped for bubbles (their look depends on a translucent rim).
  if (mode !== 'soapbubble') {
    storybookOutline(ctx, r, seed);
  }
}

function circle(ctx, x, y, r, stroke) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  if (stroke) ctx.stroke(); else ctx.fill();
}

// ===== Storybook style helpers =====
// Adds the hand-drawn, wobbly-edge, paper-textured feel that gives the
// scene its illustrated children's-book character.

// Builds a slightly irregular circle path. `seed` makes the wobble
// deterministic per ball, so the shape is stable across frames.
function wobblyCirclePath(ctx, cx, cy, r, seed, segments = 28, wobbleAmt = 0.035) {
  const rng = srand(seed);
  // Pre-roll wobbles so the closed path matches at the seam
  const ws = [];
  for (let i = 0; i < segments; i++) ws.push(1 + (rng() - 0.5) * wobbleAmt * 2);
  ctx.beginPath();
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    const w = ws[i % segments];
    const x = cx + Math.cos(a) * r * w;
    const y = cy + Math.sin(a) * r * w;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

// Two-pass slightly-offset wobbly outline — the signature storybook line.
function storybookOutline(ctx, r, seed, color = 'rgba(38, 24, 12, 0.9)') {
  const rng = srand(seed + 12345);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let pass = 0; pass < 2; pass++) {
    const ox = (rng() - 0.5) * Math.max(1, r * 0.025);
    const oy = (rng() - 0.5) * Math.max(1, r * 0.025);
    ctx.strokeStyle = color;
    ctx.lineWidth = pass === 0 ? Math.max(2, r * 0.075) : Math.max(1.2, r * 0.045);
    ctx.globalAlpha = pass === 0 ? 1 : 0.55;
    wobblyCirclePath(ctx, ox, oy, r * 0.99, seed + pass * 7, 26, 0.035);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// Pre-rendered warm paper texture — applied as a multiply overlay over the
// whole scene each frame. Cached because it never changes.
let _paperTex = null;
function getPaperTex() {
  if (_paperTex) return _paperTex;
  const SIZE = 256;
  const cv = document.createElement('canvas');
  cv.width = SIZE; cv.height = SIZE;
  const c = cv.getContext('2d');
  // Cream base
  c.fillStyle = '#f6ebd1';
  c.fillRect(0, 0, SIZE, SIZE);
  // Fine grain (per-pixel noise)
  const img = c.getImageData(0, 0, SIZE, SIZE);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 28;
    img.data[i]   = Math.max(0, Math.min(255, img.data[i]   + n));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n * 0.95));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n * 0.7));
  }
  c.putImageData(img, 0, 0);
  // Faint warm stains for that aged-paper look
  for (let i = 0; i < 14; i++) {
    const x = Math.random() * SIZE;
    const y = Math.random() * SIZE;
    const rr = 8 + Math.random() * 28;
    const g = c.createRadialGradient(x, y, 0, x, y, rr);
    g.addColorStop(0, 'rgba(155, 115, 60, 0.07)');
    g.addColorStop(1, 'rgba(155, 115, 60, 0)');
    c.fillStyle = g;
    c.beginPath(); c.arc(x, y, rr, 0, Math.PI * 2); c.fill();
  }
  // Tiny dark specks
  for (let i = 0; i < 60; i++) {
    c.fillStyle = `rgba(60, 40, 20, ${0.05 + Math.random() * 0.08})`;
    c.beginPath();
    c.arc(Math.random() * SIZE, Math.random() * SIZE, Math.random() * 1.2, 0, Math.PI * 2);
    c.fill();
  }
  _paperTex = cv;
  return cv;
}

function applyPaperOverlay(ctx) {
  const pat = ctx.createPattern(getPaperTex(), 'repeat');
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = pat;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  // Subtle warm tint on top, very low alpha
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = '#a86a28';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// Hex color tweaks (#rrggbb → rgb()). f<1 darkens, lighten blends with white.
function _parseHex(hex) {
  const c = hex.replace('#', '');
  const n = parseInt(c.length === 3
    ? c.split('').map(x => x + x).join('')
    : c, 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function darken(hex, f) {
  const [r, g, b] = _parseHex(hex);
  return `rgb(${Math.round(r * f)},${Math.round(g * f)},${Math.round(b * f)})`;
}
function lighten(hex, f) {
  const [r, g, b] = _parseHex(hex);
  return `rgb(${Math.round(r + (255 - r) * f)},${Math.round(g + (255 - g) * f)},${Math.round(b + (255 - b) * f)})`;
}

// Adds rim shading + soft specular over an already-drawn ball.
// Light source is upper-left; rim/AO is bottom-right.
function addShine(ctx, r, intensity = 1) {
  // Bottom-right rim shadow (ambient occlusion-ish)
  const rim = ctx.createRadialGradient(r * 0.18, r * 0.25, r * 0.15, r * 0.18, r * 0.25, r * 1.05);
  rim.addColorStop(0, 'rgba(0,0,0,0)');
  rim.addColorStop(0.62, 'rgba(0,0,0,0)');
  rim.addColorStop(0.92, `rgba(0,0,0,${0.28 * intensity})`);
  rim.addColorStop(1, `rgba(0,0,0,${0.42 * intensity})`);
  ctx.fillStyle = rim;
  circle(ctx, 0, 0, r);
  // Soft broad highlight
  const spec = ctx.createRadialGradient(-r * 0.42, -r * 0.45, 0, -r * 0.42, -r * 0.45, r * 0.55);
  spec.addColorStop(0, `rgba(255,255,255,${0.55 * intensity})`);
  spec.addColorStop(0.45, `rgba(255,255,255,${0.12 * intensity})`);
  spec.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = spec;
  circle(ctx, 0, 0, r);
  // Tight specular pinpoint
  ctx.fillStyle = `rgba(255,255,255,${0.92 * intensity})`;
  circle(ctx, -r * 0.44, -r * 0.46, r * 0.07);
}
function triangle(ctx, x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y - size * 0.5);
  ctx.lineTo(x - size * 0.5, y + size * 0.4);
  ctx.lineTo(x + size * 0.5, y + size * 0.4);
  ctx.closePath();
  ctx.fill();
}

// ===== Confetti =====
class Confetti {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 800;
    this.vy = -Math.random() * 900 - 200;
    this.color = color;
    this.size = 4 + Math.random() * 7;
    this.life = 1;
    this.rotation = Math.random() * Math.PI;
    this.rotSpeed = (Math.random() - 0.5) * 12;
  }
  update(dt, planet) {
    this.vy += BASE_G * planet.gMul * 0.7 * dt;
    this.vx *= Math.pow(0.98, dt * 60);
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rotation += this.rotSpeed * dt;
    this.life -= dt * 0.8;
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 1.5);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// ===== Splat (for watermelons / eyeballs that hit too hard) =====
class Splat {
  constructor(x, ballR, mode, color) {
    this.x = x;
    this.mode = mode;
    this.color = color;
    this.life = 1;          // floor blob fade (1 → 0 over ~5s)
    this.blobR = ballR * (1.7 + Math.random() * 0.7);
    this.chunks = [];
    const n = 24 + Math.floor(Math.random() * 22);
    for (let i = 0; i < n; i++) {
      this.chunks.push({
        x: x + (Math.random() - 0.5) * ballR * 0.8,
        y: H - 6 - Math.random() * 6,
        vx: (Math.random() - 0.5) * (700 + ballR * 6),
        vy: -(180 + Math.random() * 700),
        size: 4 + Math.random() * (ballR * 0.18 + 6),
        kind: Math.random() < 0.55 ? 'drop' : 'chunk',
        rot: Math.random() * Math.PI * 2,
        rotSpd: (Math.random() - 0.5) * 14,
        life: 1,
      });
    }
  }
  update(dt, planet) {
    this.life -= dt * 0.22;
    for (const c of this.chunks) {
      c.vy += BASE_G * planet.gMul * 0.7 * dt;
      c.vx *= Math.pow(0.985, dt * 60);
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.rot += c.rotSpd * dt;
      if (c.y > H - 3) {
        c.y = H - 3;

          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.ellipse(0, 0, c.size * 0.18, c.size * 0.34, 0, 0, Math.PI * 2);

          ctx.beginPath();
          ctx.ellipse(0, 0, c.size * 0.55, c.size, 0, 0, Math.PI * 2);

          ctx.fillStyle = 'rgba(255, 200, 80, 0.6)';
          ctx.beginPath();

          ctx.beginPath();
          ctx.ellipse(0, 0, c.size * 0.55, c.size, 0, 0, Math.PI * 2);

          ctx.beginPath(); ctx.arc(0, 0, c.size, 0, Math.PI * 2); ctx.fill();

// ===== Firework — when the kids are SINGING, an eyeball spontaneously
// pops mid-air into a colorful starburst with sparks streaming outward. =====
class Firework {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.life = 1;
    this.particles = [];
    const palette = [
      '#ff6b6b', '#ffd93d', '#6bcf7f', '#4d96ff', '#c780ff',
      '#ff9f43', '#48dbfb', '#1dd1a1', '#feca57', '#ff6b9d',
    ];
    const count = 70 + Math.floor(Math.random() * 30);
    // Two-color burst — pick a primary + accent for each firework
    const primary = palette[Math.floor(Math.random() * palette.length)];
    const accent  = palette[Math.floor(Math.random() * palette.length)];
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.25;
      const speed = 320 + Math.random() * 620;
      this.particles.push({
        x: 0, y: 0,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 80, // slight upward bias
        color: Math.random() < 0.7 ? primary : accent,
        life: 1,
        size: 3 + Math.random() * 3.5,
        trail: [],
      });
    }
    // A single bright flash at center on frame 0
    this.flash = 1;
  }
  update(dt, planet) {
    this.life -= dt * 0.55;
    this.flash = Math.max(0, this.flash - dt * 4);
    const grav = (planet ? BASE_G * planet.gMul : BASE_G) * 0.18;
    for (const p of this.particles) {
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 7) p.trail.shift();
      p.vy += grav * dt;
      p.vx *= Math.pow(0.965, dt * 60);
      p.vy *= Math.pow(0.97, dt * 60);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * (0.55 + Math.random() * 0.15);
    }
    this.particles = this.particles.filter(p => p.life > 0);
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    // Center flash on the burst frame
    if (this.flash > 0.05) {
      const flashGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 160);
      flashGrad.addColorStop(0, `rgba(255, 255, 255, ${this.flash})`);
      flashGrad.addColorStop(0.4, `rgba(255, 240, 180, ${this.flash * 0.7})`);
      flashGrad.addColorStop(1, 'rgba(255, 200, 120, 0)');
      ctx.fillStyle = flashGrad;
      ctx.fillRect(-180, -180, 360, 360);
    }
    // Sparks with glowing trails
    ctx.globalCompositeOperation = 'lighter';
    for (const p of this.particles) {
      // Trail
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size * 0.85;
      ctx.lineCap = 'round';
      ctx.globalAlpha = Math.max(0, p.life) * 0.55;
      ctx.beginPath();
      for (let i = 0; i < p.trail.length; i++) {
        if (i === 0) ctx.moveTo(p.trail[i].x, p.trail[i].y);
        else ctx.lineTo(p.trail[i].x, p.trail[i].y);
      }
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      // Bright spark head
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      // White hot core for first half of life
      if (p.life > 0.5) {
        ctx.fillStyle = 'rgba(255, 255, 255, ' + ((p.life - 0.5) * 1.8) + ')';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }
  get done() { return this.particles.length === 0; }
}

// ===== Sharks — only used in Underwater planet. When singing gets loud, =====
// a shark cruises across the screen, opens its mouth as it nears a ball,
// and eats it. Replacement ball comes in via the dynamic-count spawn system.
class Shark {
  constructor() {
    // 50/50 swim left-to-right or right-to-left
    this.dir = Math.random() < 0.5 ? 1 : -1;
    const len = 220 + Math.random() * 60;
    this.length = len;
    this.x = this.dir > 0 ? -len : W + len;
    // Stay in roughly the middle band — not too high, not at the floor
    this.y = H * (0.32 + Math.random() * 0.4);
    this.vx = this.dir * (180 + Math.random() * 90);
    this.bobPhase = Math.random() * Math.PI * 2;
    this.mouthOpen = 0;            // 0 = closed, 1 = wide open
    this.mouthTarget = 0;
    this.eaten = 0;                // how many balls this shark has eaten
    this.maxEat = 1 + Math.floor(Math.random() * 2);  // 1 or 2 per pass
    this.eatFlash = 0;             // brief munch flash 0..1
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.bobPhase += dt * 1.4;
    this.y += Math.sin(this.bobPhase) * 12 * dt;
    // Mouth eases toward target
    this.mouthOpen += (this.mouthTarget - this.mouthOpen) * Math.min(1, dt * 8);
    // Decay munch flash
    this.eatFlash = Math.max(0, this.eatFlash - dt * 3);
    // Mark dead when fully off-screen
    if (this.dir > 0 && this.x - this.length / 2 > W + 80) this.dead = true;
    if (this.dir < 0 && this.x + this.length / 2 < -80) this.dead = true;
  }
  // Try to eat any ball whose center crosses the shark's mouth zone.
  tryEat(balls) {
    if (this.eaten >= this.maxEat) {
      this.mouthTarget = 0;
      return;
    }
    // Mouth is at the front of the shark, in the direction of travel
    const mouthX = this.x + this.dir * (this.length * 0.42);
    const mouthY = this.y + this.length * 0.05;
    const mouthR = this.length * 0.18;
    let nearest = null;
    let nearestDist = Infinity;
    for (const b of balls) {
      if (b.dormant || b.splatted) continue;
      const dx = b.x - mouthX;
      const dy = b.y - mouthY;
      const d = Math.hypot(dx, dy);
      if (d < mouthR + b.radius + 12 && d < nearestDist) {
        nearestDist = d;
        nearest = b;
      }
    }
    // Open mouth as we approach a target, snap shut when we eat
    if (nearest) {
      this.mouthTarget = 1;
      if (nearestDist < mouthR + nearest.radius - 4) {
        nearest.splatted = true;
        this.eaten += 1;
        this.eatFlash = 1;
        this.mouthOpen = 0.4; // snap shut a bit
        // Spawn a bubble splash where the ball was
        for (let i = 0; i < 6; i++) {

      this.mouthTarget = 0;

  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.dir < 0) ctx.scale(-1, 1); // flip horizontally for right-to-left swim
    const L = this.length;
    // === Body silhouette ===
    const grad = ctx.createLinearGradient(0, -L * 0.16, 0, L * 0.16);
    grad.addColorStop(0, '#3a4a5a');
    grad.addColorStop(0.45, '#4a5e72');
    grad.addColorStop(0.55, '#dadfe4');     // pale belly
    grad.addColorStop(1, '#aebac5');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#1a2330';
    ctx.lineWidth = 1.4;

    ctx.moveTo(L * 0.5, 0);                          // tip of snout
    ctx.bezierCurveTo(L * 0.48, -L * 0.14, L * 0.2, -L * 0.18, 0, -L * 0.15);
    ctx.bezierCurveTo(-L * 0.2, -L * 0.13, -L * 0.36, -L * 0.08, -L * 0.4, -L * 0.04);
    ctx.lineTo(-L * 0.5, -L * 0.16);                 // top of tail fluke
    ctx.lineTo(-L * 0.42, 0);                        // tail notch
    ctx.lineTo(-L * 0.5, L * 0.12);                  // bottom of tail fluke
    ctx.lineTo(-L * 0.4, L * 0.04);
    ctx.bezierCurveTo(-L * 0.36, L * 0.10, -L * 0.2, L * 0.16, 0, L * 0.14);
    ctx.bezierCurveTo(L * 0.2, L * 0.13, L * 0.46, L * 0.10, L * 0.5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Belly two-tone line
    ctx.strokeStyle = 'rgba(20, 30, 45, 0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(L * 0.46, L * 0.005);
    ctx.bezierCurveTo(L * 0.2, L * 0.04, -L * 0.2, L * 0.05, -L * 0.4, L * 0.025);
    ctx.stroke();
    // === Dorsal fin (top, back-of-middle) ===
    ctx.fillStyle = '#3a4a5a';
    ctx.beginPath();
    ctx.moveTo(-L * 0.05, -L * 0.16);
    ctx.lineTo(-L * 0.18, -L * 0.34);
    ctx.lineTo(-L * 0.22, -L * 0.16);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#1a2330';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // === Pectoral fin (side, front-mid) ===
    ctx.fillStyle = '#324050';
    ctx.beginPath();
    ctx.moveTo(L * 0.08, L * 0.10);
    ctx.lineTo(L * 0.0, L * 0.28);
    ctx.lineTo(-L * 0.08, L * 0.13);
    ctx.closePath();

    ctx.strokeStyle = 'rgba(20, 30, 45, 0.55)';
    ctx.lineWidth = 1.2;

      const gx = L * 0.22 - i * L * 0.025;

      ctx.moveTo(gx, -L * 0.06);
      ctx.lineTo(gx + L * 0.005, L * 0.05);
      ctx.stroke();

    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(L * 0.32, -L * 0.06, L * 0.022, 0, Math.PI * 2);

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(L * 0.325, -L * 0.07, L * 0.008, 0, Math.PI * 2);

    const m = this.mouthOpen;
    if (m > 0.02) {
      // Dark inner mouth
      ctx.fillStyle = '#1a0a08';
      ctx.beginPath();
      ctx.moveTo(L * 0.5, 0);
      ctx.lineTo(L * 0.36, -L * 0.06 * m);
      ctx.lineTo(L * 0.30, -L * 0.04 * m);
      ctx.lineTo(L * 0.30, L * 0.05 * m);
      ctx.lineTo(L * 0.36, L * 0.07 * m);
      ctx.closePath();
      ctx.fill();
      // Teeth — top row (jagged)
      ctx.fillStyle = '#fafaf2';
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 0.6;
      const teethCount = 6;
      const topY = -L * 0.06 * m;
      const botY =  L * 0.07 * m;
      for (let i = 0; i < teethCount; i++) {
        const tx = L * 0.31 + (i / (teethCount - 1)) * (L * 0.18);
        const tw = L * 0.018;
        // Top tooth
        ctx.beginPath();
        ctx.moveTo(tx - tw / 2, topY);
        ctx.lineTo(tx, topY + L * 0.035 * m);
        ctx.lineTo(tx + tw / 2, topY);
        ctx.closePath();
        ctx.fill(); ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(tx - tw / 2, botY);
        ctx.lineTo(tx, botY - L * 0.035 * m);
        ctx.lineTo(tx + tw / 2, botY);
        ctx.closePath();
        ctx.fill(); ctx.stroke();

    if (this.eatFlash > 0.05) {
      ctx.globalCompositeOperation = 'lighter';
      const fg = ctx.createRadialGradient(L * 0.42, 0, 2, L * 0.42, 0, L * 0.3);
      fg.addColorStop(0, `rgba(255, 220, 120, ${this.eatFlash * 0.9})`);
      fg.addColorStop(1, 'rgba(255, 220, 120, 0)');
      ctx.fillStyle = fg;
      ctx.fillRect(L * 0.1, -L * 0.3, L * 0.5, L * 0.6);
      ctx.globalCompositeOperation = 'source-over';
    }
    ctx.restore();
  }
}

// ===== Static background layer cache =====
// Renders expensive detail (terrain, planets, nebulae) once per resize/planet
// to an offscreen canvas; the main loop blits it and overlays animated bits.
const bgCache = { key: null, canvas: null };
function getStaticBg(planetKey) {
  const key = `${planetKey}_${W}_${H}`;
  if (bgCache.key === key) return bgCache.canvas;
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  const o = oc.getContext('2d');
  STATIC_RENDERERS[planetKey](o);
  bgCache.key = key;
  bgCache.canvas = oc;
  return oc;
}
window.addEventListener('resize', () => { bgCache.key = null; });

// Helper: random with seed (deterministic terrain)
function srand(seed) {
  let s = seed;
  return () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

const STATIC_RENDERERS = {
  earth(o) {
    // Sky gradient: deep blue → light blue → warm horizon
    const sky = o.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1e4d8c');
    sky.addColorStop(0.4, '#5a9fd6');
    sky.addColorStop(0.75, '#a8d4f0');

    o.fillRect(0, 0, W, H);

    const sx = W * 0.82, sy = H * 0.22;

    halo.addColorStop(0, 'rgba(255, 245, 200, 0.5)');
    halo.addColorStop(0.3, 'rgba(255, 220, 150, 0.2)');
    halo.addColorStop(1, 'rgba(255, 200, 120, 0)');
    o.fillStyle = halo;

    const sunGrad = o.createRadialGradient(sx, sy, 0, sx, sy, 60);
    sunGrad.addColorStop(0, '#fffce8');

    // Distant mountain layer (back, hazy)

    o.beginPath();
    o.moveTo(0, H * 0.78);
    const r1 = srand(7);
    for (let x = 0; x <= W; x += 30) {
      const y = H * 0.78 - Math.sin(x * 0.004) * 35 - Math.sin(x * 0.011) * 18 - r1() * 8;
      o.lineTo(x, y);
    }
    o.lineTo(W, H); o.lineTo(0, H); o.closePath(); o.fill();

    // Closer mountain layer (darker)

      o.stroke();
    }
  },

  moon(o) {
    // Dark starry sky
    const sky = o.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#000008');
    sky.addColorStop(0.6, '#0a0a1a');
    sky.addColorStop(1, '#1a1a26');
    o.fillStyle = sky;
    o.fillRect(0, 0, W, H);

    // Distant stars baked in
    const r = srand(101);
    for (let i = 0; i < 180; i++) {
      const x = r() * W, y = r() * H * 0.85;
      const s = r() * 1.4 + 0.3;
      o.fillStyle = `rgba(255,255,255,${0.4 + r() * 0.5})`;
      o.beginPath(); o.arc(x, y, s, 0, Math.PI * 2); o.fill();
    }

    // Earth in the sky
    const ex = W * 0.78, ey = H * 0.18, eR = Math.min(W, H) * 0.09;
    // Earth glow
    const eGlow = o.createRadialGradient(ex, ey, eR * 0.9, ex, ey, eR * 1.6);
    eGlow.addColorStop(0, 'rgba(120, 180, 255, 0.4)');
    eGlow.addColorStop(1, 'rgba(120, 180, 255, 0)');
    o.fillStyle = eGlow;
    o.fillRect(ex - eR * 2, ey - eR * 2, eR * 4, eR * 4);
    // Earth body (lit on right, dark on left)
    const eGrad = o.createRadialGradient(ex + eR * 0.4, ey - eR * 0.2, eR * 0.1, ex, ey, eR);
    eGrad.addColorStop(0, '#a8d4ff');
    eGrad.addColorStop(0.4, '#3a78c4');
    eGrad.addColorStop(0.8, '#1a3a6a');
    eGrad.addColorStop(1, '#020814');
    o.fillStyle = eGrad;
    o.beginPath(); o.arc(ex, ey, eR, 0, Math.PI * 2); o.fill();
    // Continent suggestions
    o.fillStyle = 'rgba(80, 130, 70, 0.5)';
    o.beginPath();
    o.ellipse(ex + eR * 0.2, ey - eR * 0.1, eR * 0.35, eR * 0.2, 0.4, 0, Math.PI * 2);
    o.fill();
    o.beginPath();
    o.ellipse(ex + eR * 0.5, ey + eR * 0.3, eR * 0.2, eR * 0.15, -0.3, 0, Math.PI * 2);
    o.fill();
    // Cloud swirls
    o.fillStyle = 'rgba(255, 255, 255, 0.3)';
    o.beginPath();
    o.ellipse(ex + eR * 0.1, ey + eR * 0.1, eR * 0.5, eR * 0.12, 0.3, 0, Math.PI * 2);
    o.fill();

    // Lunar surface
    const ground = H * 0.78;
    // Hilly horizon
    o.fillStyle = '#3a3a44';
    o.beginPath();
    o.moveTo(0, ground);
    const r2 = srand(57);
    for (let x = 0; x <= W; x += 20) {
      const y = ground - Math.sin(x * 0.008) * 20 - Math.sin(x * 0.022) * 10 - r2() * 6;
      o.lineTo(x, y);
    }
    o.lineTo(W, H); o.lineTo(0, H); o.closePath(); o.fill();

    // Lunar regolith with crater detail
    const dust = o.createLinearGradient(0, ground, 0, H);
    dust.addColorStop(0, '#5e5e6e');
    dust.addColorStop(0.5, '#48485a');
    dust.addColorStop(1, '#2e2e3a');
    o.fillStyle = dust;
    o.fillRect(0, ground, W, H - ground);
    // Craters on surface
    const r3 = srand(211);
    for (let i = 0; i < 20; i++) {
      const cx = r3() * W;
      const cy = ground + 20 + r3() * (H - ground - 20);
      const cr = 8 + r3() * 30;
      // shadow side
      o.fillStyle = 'rgba(0,0,0,0.35)';
      o.beginPath(); o.arc(cx, cy, cr, 0, Math.PI * 2); o.fill();
      // lit rim
      o.strokeStyle = 'rgba(220, 220, 230, 0.4)';
      o.lineWidth = 1.5;
      o.beginPath();
      o.arc(cx, cy, cr, Math.PI * 1.1, Math.PI * 1.9);
      o.stroke();
      // inner highlight
      o.fillStyle = 'rgba(140, 140, 160, 0.5)';
      o.beginPath(); o.arc(cx - cr * 0.2, cy - cr * 0.2, cr * 0.5, 0, Math.PI * 2); o.fill();
    }
  },

  space(o) {
    // Deep space with nebula
    const sky = o.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#000004');
    sky.addColorStop(0.5, '#06061a');
    sky.addColorStop(1, '#020208');
    o.fillStyle = sky;
    o.fillRect(0, 0, W, H);

    // Nebula clouds — soft colored radial gradients
    const nebulae = [
      { x: 0.25, y: 0.4, r: 0.5, c: [180, 60, 200] },
      { x: 0.75, y: 0.65, r: 0.45, c: [60, 120, 240] },
      { x: 0.5, y: 0.2, r: 0.4, c: [240, 100, 140] },
      { x: 0.15, y: 0.75, r: 0.35, c: [80, 200, 220] }
    ];
    for (const n of nebulae) {
      const cx = n.x * W, cy = n.y * H, cr = n.r * Math.min(W, H);
      const g = o.createRadialGradient(cx, cy, 0, cx, cy, cr);
      g.addColorStop(0, `rgba(${n.c[0]}, ${n.c[1]}, ${n.c[2]}, 0.35)`);
      g.addColorStop(0.5, `rgba(${n.c[0]}, ${n.c[1]}, ${n.c[2]}, 0.12)`);
      g.addColorStop(1, `rgba(${n.c[0]}, ${n.c[1]}, ${n.c[2]}, 0)`);
      o.fillStyle = g;
      o.fillRect(0, 0, W, H);
    }

    // Distant galaxy spiral
    const gx = W * 0.85, gy = H * 0.25;
    o.save();
    o.translate(gx, gy);
    o.rotate(0.3);
    const ggrad = o.createRadialGradient(0, 0, 0, 0, 0, 80);
    ggrad.addColorStop(0, 'rgba(255, 240, 200, 0.7)');
    ggrad.addColorStop(0.4, 'rgba(200, 180, 240, 0.3)');
    ggrad.addColorStop(1, 'rgba(120, 100, 200, 0)');
    o.fillStyle = ggrad;
    o.beginPath(); o.ellipse(0, 0, 80, 22, 0, 0, Math.PI * 2); o.fill();
    // core
    o.fillStyle = 'rgba(255, 250, 230, 0.9)';
    o.beginPath(); o.ellipse(0, 0, 14, 7, 0, 0, Math.PI * 2); o.fill();
    o.restore();
  },

  water(o) {
    // Underwater gradient
    const sky = o.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#7fd4f5');
    sky.addColorStop(0.15, '#3a9fd0');
    sky.addColorStop(0.5, '#0a4a7a');
    sky.addColorStop(0.85, '#022040');
    sky.addColorStop(1, '#5a4a30');
    o.fillStyle = sky;
    o.fillRect(0, 0, W, H);

    // Sandy ocean floor
    const sand = o.createLinearGradient(0, H * 0.86, 0, H);
    sand.addColorStop(0, '#a89060');
    sand.addColorStop(0.5, '#6a5430');
    sand.addColorStop(1, '#3a2a18');
    o.fillStyle = sand;
    o.beginPath();
    o.moveTo(0, H * 0.88);
    const r1 = srand(141);
    for (let x = 0; x <= W; x += 30) {
      o.lineTo(x, H * 0.88 + Math.sin(x * 0.012) * 8 + r1() * 4);
    }
    o.lineTo(W, H); o.lineTo(0, H); o.closePath();
    o.fill();

    // Seaweed silhouettes
    const r2 = srand(167);
    for (let i = 0; i < 14; i++) {
      const x = r2() * W;
      const h = 60 + r2() * 140;
      o.strokeStyle = `rgba(20, 60, 40, ${0.4 + r2() * 0.4})`;
      o.lineWidth = 3 + r2() * 4;
      o.lineCap = 'round';
      o.beginPath();
      o.moveTo(x, H * 0.88);
      for (let s = 0; s < h; s += 12) {
        o.lineTo(x + Math.sin(s * 0.05) * 8, H * 0.88 - s);
      }
      o.stroke();
    }

    // Distant fish silhouettes
    o.fillStyle = 'rgba(10, 30, 50, 0.4)';
    for (let i = 0; i < 5; i++) {
      const x = r2() * W;
      const y = H * 0.3 + r2() * H * 0.4;
      const fs = 6 + r2() * 8;
      o.beginPath();
      o.ellipse(x, y, fs, fs * 0.4, 0, 0, Math.PI * 2);
      o.fill();
      // Tail
      o.beginPath();
      o.moveTo(x - fs, y);
      o.lineTo(x - fs * 1.6, y - fs * 0.4);
      o.lineTo(x - fs * 1.6, y + fs * 0.4);
      o.closePath();
      o.fill();
    }
  },

};

// ===== Balls =====
let balls = [];
let confetti = [];

// Initial population — placed at floor like before (or scattered for bubbles).
function seedBalls(n) {
  balls = [];
  for (let i = 0; i < n; i++) {
    const b = new Ball(Math.random() * W);
    if (state.ballMode === 'soapbubble') {
      b.x = Math.random() * W;
      b.y = H * (0.4 + Math.random() * 0.6);
      b.vx = (Math.random() - 0.5) * 60;
      b.vy = -50 - Math.random() * 80;
    }
    balls.push(b);
  }
}
seedBalls(state.ballCount);

// Spawn a fresh ball — entrance depends on the ball mode.
//   • soapbubble: rises from below the bottom with upward velocity
//   • everything else: flies in from off-screen on a side
function spawnFromSide() {
  const ball = new Ball(0);
  if (state.ballMode === 'soapbubble') {
    ball.x = Math.random() * W;
    ball.y = H + ball.radius + Math.random() * 40;
    ball.vx = (Math.random() - 0.5) * 80;
    ball.vy = -180 - Math.random() * 160;
    ball.angVel = 0;
  } else {
    const fromLeft = Math.random() < 0.5;
    ball.x = fromLeft ? -ball.radius - 30 : W + ball.radius + 30;
    ball.y = H * (0.15 + Math.random() * 0.55);
    const speed = 350 + Math.random() * 450;
    ball.vx = fromLeft ? speed : -speed;
    ball.vy = -100 + Math.random() * 250;
    ball.angVel = (Math.random() - 0.5) * 6;
  }
  balls.push(ball);
}

// Pick an active ball and mark it dormant. It will stop responding to
// loudness, lose its bouncing energy as it lands, and gently roll off
// the nearest side. If volume returns, wakeOne() can re-engage it.
function sendOneAway() {
  let candidate = null;
  for (const b of balls) {
    if (b.dormant) continue;
    if (!candidate) { candidate = b; continue; }
    // Prefer balls closer to a side
    const cDist = Math.min(candidate.x, W - candidate.x);
    const bDist = Math.min(b.x, W - b.x);
    if (bDist < cDist) candidate = b;
  }
  if (!candidate) return;
  candidate.dormant = true;
  candidate.exitDir = candidate.x < W / 2 ? -1 : 1;
}

// Wake the dormant ball nearest the center (most likely still on screen)
// so the kids see it spring back to life.
function wakeOne() {
  let candidate = null;
  for (const b of balls) {
    if (!b.dormant) continue;
    if (b.x < -b.radius || b.x > W + b.radius) continue; // already off-screen
    if (!candidate) { candidate = b; continue; }
    // Prefer the ball furthest from the edge it's heading toward
    const cDist = candidate.exitDir < 0 ? candidate.x : W - candidate.x;
    const bDist = b.exitDir < 0 ? b.x : W - b.x;
    if (bDist > cDist) candidate = b;
  }
  if (!candidate) return false;
  candidate.dormant = false;
  candidate.exitDir = 0;
  // Small kick if it's resting, so it visibly re-engages
  if (candidate.y >= H - candidate.radius - 5) {
    candidate.vy = -250;
    if (0.7 < candidate.squash) candidate.squash = 0.7;
  }
  return true;
}
window.addEventListener('resize', () => {
  for (const b of balls) {
    b.x = Math.min(b.x, W - b.radius);
    b.y = Math.min(b.y, H - b.radius);
  }
});

let analyser, dataArray, audioCtx;
let smoothedLoudness = 0;
let peakLoudness = 0;
let fireworkCooldown = 0;   // seconds until the next eyeball-firework can pop
let lastEncourageTime = 0;
let lastPhrase = '';
let spawnAcc = 0; // throttles ball add/remove rate

async function startAudio() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert(
        "Microphone access isn't available in this view.\n\n" +
        "To fix this, open this file directly in Chrome or Safari:\n" +
        "1. Find bouncing-balls.html on your Desktop\n" +
        "2. Right-click → Open With → Chrome (or Safari)\n\n" +
        "Or run a local server:\n" +
        "  cd to the folder, then: python3 -m http.server 8000\n" +
        "  Then visit http://localhost:8000/bouncing-balls.html"
      );
      return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.2;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.fftSize);
    startScreen.style.display = 'none';
    document.getElementById('finishBtn').classList.remove('hidden');
    lastFrameTime = performance.now();
    requestAnimationFrame(loop);
  } catch (e) {
    alert('Could not access microphone: ' + e.message);
  }
}

startBtn.addEventListener('click', startAudio);

let lastRawRms = 0;       // raw mic RMS before sensitivity
let lastEffectiveRms = 0; // raw RMS minus the noise gate (when auto on)
let noiseFloor = 0.01;    // tracked low-envelope of the raw signal
function getLoudness() {
  if (!analyser) return 0;
  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const v = (dataArray[i] - 128) / 128;
    sum += v * v;
  }
  lastRawRms = Math.sqrt(sum / dataArray.length);
  // Auto mode applies a noise gate: signals close to the room's ambient
  // floor are zeroed out so general room tone stops nudging the balls.
  // The 1.6× multiplier + small absolute pad gives a comfortable margin
  // above the floor before anything registers.
  if (state.autoSensitivity) {
    const gate = noiseFloor * 1.6 + 0.005;
    lastEffectiveRms = Math.max(0, lastRawRms - gate);
  } else {
    lastEffectiveRms = lastRawRms;
  }
  return Math.min(1, lastEffectiveRms * state.sensitivity);
}

function showEncouragement(loudness) {
  const now = performance.now();
  if (loudness > 0.55 && now - lastEncourageTime > 1300) {
    let phrase;
    do {
      phrase = PHRASES[Math.floor(Math.random() * PHRASES.length)];
    } while (phrase === lastPhrase && PHRASES.length > 1);
    lastPhrase = phrase;
    encourage.textContent = phrase;
    encourage.style.opacity = '1';
    encourage.style.transform = `translateX(-50%) scale(${1 + loudness * 0.4})`;
    lastEncourageTime = now;
    setTimeout(() => { encourage.style.opacity = '0'; }, 800);
  }
}

function spawnConfetti(loudness) {

    for (let i = 0; i < n; i++) {
      confetti.push(new Confetti(

      ));

}

function spawnBubble() {
  bubbles.push({
    x: Math.random() * W,
