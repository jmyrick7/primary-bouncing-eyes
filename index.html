  });
}

// ===== Background drawing — static cache + animated overlays =====
let bgTime = 0;
function makeCloudSprite(c) {
  // Build a fluffy silhouette from many overlapping puffs whose distribution
  // is fuller in the middle and thinner toward the ends (bell-ish).
  const padding = c.s * 1.6;
  const cw = padding * 2.2;
  const ch = padding * 1.4;
  const cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  const o = cv.getContext('2d');
  const cx = cw / 2, cy = ch / 2;
  const rng = srand(Math.floor(c.seed * 1000) + 1);

  const n = 18 + Math.floor(rng() * 8);
  const puffs = [];
  for (let i = 0; i < n; i++) {
    const u = (i / (n - 1) - 0.5) * 2; // -1..1 left→right
    const lift = Math.exp(-u * u * 1.6); // bell shape
    puffs.push({
      x: cx + u * c.s * 0.95 + (rng() - 0.5) * c.s * 0.18,
      y: cy + (rng() - 0.5) * c.s * 0.18 - lift * c.s * 0.18,
      r: c.s * (0.30 + lift * 0.22 + rng() * 0.18),
    });
  }

  // 1) Soft underside shadow (offset down, bluish-gray)
  o.fillStyle = 'rgba(120, 145, 175, 0.85)';
  o.beginPath();
  for (const p of puffs) {
    o.moveTo(p.x + p.r, p.y + c.s * 0.12);
    o.arc(p.x, p.y + c.s * 0.12, p.r * 1.02, 0, Math.PI * 2);
  }
  o.fill();

  // 2) Mid body (slight gray-blue tint where shaded)
  o.fillStyle = 'rgba(220, 228, 240, 0.95)';
  o.beginPath();
  for (const p of puffs) {
    o.moveTo(p.x + p.r, p.y + c.s * 0.04);
    o.arc(p.x, p.y + c.s * 0.04, p.r, 0, Math.PI * 2);
  }
  o.fill();

  // 3) Bright body
  o.fillStyle = '#ffffff';
  o.beginPath();
  for (const p of puffs) {
    o.moveTo(p.x + p.r * 0.95, p.y - c.s * 0.02);
    o.arc(p.x, p.y - c.s * 0.02, p.r * 0.95, 0, Math.PI * 2);
  }
  o.fill();

  // 4) Sunlit top (warm white)
  o.fillStyle = 'rgba(255, 250, 235, 0.85)';
  o.beginPath();
  for (const p of puffs) {
    o.moveTo(p.x + p.r * 0.55, p.y - c.s * 0.16);
    o.arc(p.x, p.y - c.s * 0.16, p.r * 0.55, 0, Math.PI * 2);
  }
  o.fill();

  // 5) Tiny bright pinpoints on the sunny side
  o.fillStyle = 'rgba(255, 255, 255, 0.9)';
  for (const p of puffs) {
    if (rng() < 0.6) {
      const sr = p.r * (0.18 + rng() * 0.18);
      o.beginPath();
      o.arc(p.x - p.r * 0.25, p.y - p.r * 0.45, sr, 0, Math.PI * 2);
      o.fill();
    }
  }

  return { canvas: cv, ox: cx, oy: cy };
}

function drawCloud(ctx, c, t) {
  if (!c.sprite) c.sprite = makeCloudSprite(c);
  const x = ((c.x + c.spd * t) % 1.2 - 0.1) * W;
  const y = c.y * H;
  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.drawImage(c.sprite.canvas, x - c.sprite.ox, y - c.sprite.oy);
  ctx.restore();
}

function maybeSpawnMeteor(planetKey) {
  if (planetKey !== 'space' && planetKey !== 'moon') return;
  if (Math.random() < 0.003) {
    meteors.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.5,
      vx: 400 + Math.random() * 600,
      vy: 200 + Math.random() * 300,
      life: 1,
      len: 60 + Math.random() * 80
    });
  }
}

function drawBackground(planet, dt) {
  bgTime += dt;
  // Blit pre-rendered static layer
  ctx.drawImage(getStaticBg(state.planet), 0, 0);

  // ===== Per-planet animated overlays =====
  if (state.planet === 'earth') {
    for (const c of clouds) drawCloud(ctx, c, bgTime);
  }

  if (state.planet === 'space') {
    for (const s of stars) {
      s.tw += dt * s.twSpd;
      const a = 0.5 + 0.5 * Math.sin(s.tw);
      const [r, g, b] = s.color;
      ctx.fillStyle = `rgba(${r},${g},${b},${0.3 + a * 0.7})`;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2);
      ctx.fill();
      // Cross sparkle for the brightest stars
      if (s.s > 1.6 && a > 0.85) {
        ctx.strokeStyle = `rgba(${r},${g},${b},${a * 0.6})`;
        ctx.lineWidth = 0.6;
        const sp = s.s * 4;
        ctx.beginPath();
        ctx.moveTo(s.x * W - sp, s.y * H);
        ctx.lineTo(s.x * W + sp, s.y * H);
        ctx.moveTo(s.x * W, s.y * H - sp);
        ctx.lineTo(s.x * W, s.y * H + sp);
        ctx.stroke();
      }
    }
  }

  if (state.planet === 'water') {
    // God rays from above
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 6; i++) {
      const x = (i / 6) * W + Math.sin(bgTime * 0.3 + i) * 40;
      const grad = ctx.createLinearGradient(x, 0, x + 60, H * 0.7);
      grad.addColorStop(0, 'rgba(180, 230, 255, 0.18)');
      grad.addColorStop(1, 'rgba(180, 230, 255, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x - 30, 0);
      ctx.lineTo(x + 30, 0);
      ctx.lineTo(x + 90, H * 0.7);
      ctx.lineTo(x - 90, H * 0.7);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Floating particulate motes
    for (const m of waterMotes) {
      m.y += (m.vy / H) * dt;
      m.wob += dt * 1.5;
      m.x += Math.sin(m.wob) * 0.0005;
      if (m.y < 0) m.y = 1;
      ctx.fillStyle = `rgba(200, 230, 255, ${0.25 + m.s * 0.1})`;
      ctx.beginPath();
      ctx.arc(m.x * W, m.y * H, m.s, 0, Math.PI * 2);
      ctx.fill();
    }

    // Bubbles
    if (Math.random() < dt * 10) spawnBubble();
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.y += b.vy * dt;
      b.wob += dt * 2;
      b.x += Math.sin(b.wob) * 20 * dt;
      ctx.strokeStyle = 'rgba(200, 240, 255, 0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
      // Inner highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
      ctx.fill();
      if (b.y < -20) bubbles.splice(i, 1);
    }
  }

  // Shooting stars (space + moon)
  maybeSpawnMeteor(state.planet);
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.life -= dt * 0.6;
    const tailX = m.x - (m.vx / Math.hypot(m.vx, m.vy)) * m.len;
    const tailY = m.y - (m.vy / Math.hypot(m.vx, m.vy)) * m.len;
    const grad = ctx.createLinearGradient(tailX, tailY, m.x, m.y);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(1, `rgba(255,255,255,${m.life})`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tailX, tailY); ctx.lineTo(m.x, m.y);
    ctx.stroke();
    if (m.life <= 0 || m.x > W + 100 || m.y > H + 100) meteors.splice(i, 1);
  }
}

// ===== Celebration =====
// A short (≈6s) finishing animation tailored to the current ball mode.
const celebration = { active: false, t: 0, mode: null, duration: 6 };
function startCelebration() {
  if (celebration.active) return;
  celebration.active = true;
  celebration.t = 0;
  celebration.mode = state.ballMode;
  document.getElementById('finishBtn').classList.add('hidden');
  // Big confetti burst regardless of mode
  for (let i = 0; i < 80; i++) {
    confetti.push(new Confetti(W * 0.5, H * 0.6, COLORS[i % COLORS.length]));
  }
}
function endCelebration() {
  celebration.active = false;
  document.getElementById('finishBtn').classList.remove('hidden');
}

// Helper: draw a hand-drawn-feeling text banner with a soft cream backdrop.
function celebrationBanner(ctx, lines, t) {
  const bounce = Math.sin(t * 5) * 6;
  const y0 = H * 0.16 + bounce;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Subtle backdrop pill
  ctx.font = 'bold 64px system-ui, sans-serif';
  const titleW = ctx.measureText(lines[0]).width;
  const padX = 36, padY = 20;
  const bw = titleW + padX * 2;
  const bh = (lines.length === 1 ? 84 : 138);
  ctx.fillStyle = 'rgba(250, 240, 215, 0.92)';
  roundRect(ctx, W / 2 - bw / 2, y0 - bh / 2, bw, bh, 22);
  ctx.fill();
  ctx.strokeStyle = 'rgba(60, 30, 10, 0.85)';
  ctx.lineWidth = 4;
  roundRect(ctx, W / 2 - bw / 2, y0 - bh / 2, bw, bh, 22);
  ctx.stroke();
  // Title — rainbow-ish gradient
  const grad = ctx.createLinearGradient(W / 2 - titleW / 2, 0, W / 2 + titleW / 2, 0);
  grad.addColorStop(0, '#ff5a3a');
  grad.addColorStop(0.5, '#ffb030');
  grad.addColorStop(1, '#4d96ff');
  ctx.fillStyle = grad;
  ctx.font = 'bold 64px system-ui, sans-serif';
  ctx.fillText(lines[0], W / 2, y0 - (lines.length > 1 ? 22 : 0));
  if (lines[1]) {
    ctx.fillStyle = '#3a2410';
    ctx.font = 'bold 26px system-ui, sans-serif';
    ctx.fillText(lines[1], W / 2, y0 + 30);
  }
  ctx.restore();
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Cyclops — for eyeball mode. A single huge friendly eye in the middle that
// looks around and smiles.
function drawCyclops(ctx, t) {
  const cx = W * 0.5, cy = H * 0.55;
  const r = Math.min(W, H) * 0.22;
  // Squashy entrance scale (0 → 1 over first 0.4s with a bit of overshoot)
  const intro = Math.min(1, t / 0.4);
  const overshoot = 1 + Math.sin(intro * Math.PI) * 0.12;
  const scale = (intro * intro * (3 - 2 * intro)) * overshoot;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  // Sclera (white, slight veins)
  const grad = ctx.createRadialGradient(-r * 0.2, -r * 0.25, r * 0.1, 0, 0, r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#e8e8f0');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(220, 50, 50, 0.4)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + 0.4;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.96, Math.sin(a) * r * 0.96);
    ctx.quadraticCurveTo(
      Math.cos(a + 0.2) * r * 0.6, Math.sin(a + 0.2) * r * 0.6,
      Math.cos(a + 0.1) * r * 0.4, Math.sin(a + 0.1) * r * 0.4
    );
    ctx.stroke();
  }
  // Iris that looks around
  const lookT = Math.max(0, t - 0.5);
  const lookX = Math.sin(lookT * 2.0) * r * 0.35;
  const lookY = Math.cos(lookT * 1.3) * r * 0.18;
  // Blink near t=2.4s and t=4.5s
  const blink = Math.max(
    0,
    1 - Math.abs(t - 2.4) * 6,
    1 - Math.abs(t - 4.5) * 6
  );
  const eyeOpenY = 1 - blink;
  ctx.save();
  ctx.translate(lookX, lookY);
  ctx.scale(1, eyeOpenY);
  // Iris
  const iris = ctx.createRadialGradient(0, 0, r * 0.05, 0, 0, r * 0.42);
  iris.addColorStop(0, '#7fc8ff');
  iris.addColorStop(0.7, '#3a78c8');
  iris.addColorStop(1, '#0a2855');
  ctx.fillStyle = iris;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.42, 0, Math.PI * 2); ctx.fill();
  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2); ctx.fill();
  // Catchlight
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r * 0.08, -r * 0.08, r * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Storybook outline (uses a fixed seed for stability)
  storybookOutline(ctx, r, 99001);
  ctx.restore();
  // Smile below the eye
  const smileY = cy + r + 30;
  ctx.save();
  ctx.strokeStyle = '#3a1a08';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  const sw = r * 0.95;
  ctx.beginPath();
  ctx.moveTo(cx - sw, smileY);
  ctx.quadraticCurveTo(cx, smileY + 50 + Math.sin(t * 4) * 3, cx + sw, smileY);
  ctx.stroke();
  ctx.restore();
  // Banner
  celebrationBanner(ctx, ['EYE-MAZING!', 'one big eye says GREAT JOB'], t);
}

// Watermelon — a giant slice spinning in, with juice splashes.
function drawWatermelon(ctx, t) {
  const cx = W * 0.5, cy = H * 0.55;
  const r = Math.min(W, H) * 0.24;
  const spin = t * 1.2;
  const intro = Math.min(1, t / 0.5);
  const scale = intro * intro * (3 - 2 * intro);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(spin);
  ctx.scale(scale, scale);
  // Pink flesh
  ctx.fillStyle = '#ff5c8a';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  // Inner light pink
  ctx.fillStyle = '#ff85a8';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff5c8a';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.78, 0, Math.PI * 2); ctx.fill();
  // Seeds
  ctx.fillStyle = '#1a1a1a';
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    const sr = r * 0.5;
    ctx.save();
    ctx.translate(Math.cos(a) * sr, Math.sin(a) * sr);
    ctx.rotate(a);
    ctx.beginPath(); ctx.ellipse(0, 0, r * 0.05, r * 0.10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  // Green rind
  ctx.strokeStyle = '#2eb84a';
  ctx.lineWidth = r * 0.14;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.93, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = '#0f5c1f';
  ctx.lineWidth = r * 0.05;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.99, 0, Math.PI * 2); ctx.stroke();
  storybookOutline(ctx, r, 88002);
  ctx.restore();
  // Juice droplets flying outward
  const drops = 24;
  for (let i = 0; i < drops; i++) {
    const a = (i / drops) * Math.PI * 2 + t * 0.5;
    const phase = (t * 0.6 + i * 0.13) % 1.4;
    const dist = phase * Math.min(W, H) * 0.5;
    const dx = cx + Math.cos(a) * dist;
    const dy = cy + Math.sin(a) * dist;
    const alpha = Math.max(0, 1 - phase / 1.4);
    ctx.fillStyle = `rgba(230, 46, 74, ${alpha})`;
    ctx.beginPath();
    ctx.ellipse(dx, dy, 6, 10, a, 0, Math.PI * 2);
    ctx.fill();
  }
  celebrationBanner(ctx, ['JUICY JOB!', 'watermelon-tastic singing'], t);
}

// Popcorn — every kernel pops at once into a buttery shower.
function drawPopcorn(ctx, t) {
  const cx = W * 0.5, cy = H * 0.55;
  // Big bag of popcorn silhouette
  const intro = Math.min(1, t / 0.4);
  const scale = intro * intro * (3 - 2 * intro);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  // Red-and-white striped bag
  const bw = Math.min(W, H) * 0.22;
  const bh = bw * 1.1;
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, -bw / 2, -bh / 2, bw, bh, 14); ctx.fill();
  // Stripes
  for (let i = 0; i < 6; i++) {
    if (i % 2 === 0) continue;
    ctx.fillStyle = '#e8202a';
    ctx.fillRect(-bw / 2 + i * (bw / 6), -bh / 2, bw / 6, bh);
  }
  // Bag opening (dark)
  ctx.fillStyle = 'rgba(120, 70, 30, 0.4)';
  ctx.beginPath();
  ctx.ellipse(0, -bh / 2 + 8, bw / 2 - 8, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Bag outline
  storybookOutline(ctx, bw / 2, 77003);
  ctx.restore();
  // Popcorn pieces erupting from the bag
  const pieces = 40;
  for (let i = 0; i < pieces; i++) {
    const seed = i * 37;
    const r = ((Math.sin(seed) + 1) * 8 + 6);
    const baseAngle = -Math.PI / 2 + (((seed * 0.7) % 1) - 0.5) * Math.PI * 1.0;
    const speed = 250 + (Math.cos(seed) + 1) * 200;
    // simple ballistic from cy - bh/2
    const px = cx + Math.cos(baseAngle) * speed * t;
    const py = (cy - 70) + Math.sin(baseAngle) * speed * t + 0.5 * 600 * t * t;
    if (py > H + 40) continue;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(t * (2 + (seed % 5)));
    // Tiny popcorn piece
    ctx.fillStyle = '#fff5d8';
    for (let k = 0; k < 4; k++) {
      const a = (k / 4) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * r * 0.4, Math.sin(a) * r * 0.4, r * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255, 200, 80, 0.6)';
    ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  celebrationBanner(ctx, ['POP-TASTIC!', 'kernels of pure joy'], t);
}

// Bubbles — a giant bubble ascends, then pops into a cascade of smaller ones.
function drawBubblesCelebration(ctx, t) {
  const cx = W * 0.5;
  const popAt = 2.4;
  if (t < popAt) {
    // Rising giant bubble
    const r = Math.min(W, H) * 0.18 * (0.6 + t / popAt * 0.7);
    const y = H * 0.85 - (t / popAt) * H * 0.6;
    ctx.save();
    ctx.translate(cx, y);
    // body
    const body = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.05, 0, 0, r);
    body.addColorStop(0, 'rgba(255, 255, 255, 0.45)');
    body.addColorStop(0.6, 'rgba(190, 230, 255, 0.18)');
    body.addColorStop(1, 'rgba(140, 190, 255, 0.4)');
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    // Sheen
    ctx.globalCompositeOperation = 'screen';
    const sheen = (sx, sy, sr, c) => {
      const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
      g.addColorStop(0, c + '90');
      g.addColorStop(1, c + '00');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    };
    sheen( r * 0.25,  r * 0.20, r * 0.55, '#ff9eea');
    sheen(-r * 0.30,  r * 0.10, r * 0.55, '#9eeaff');
    sheen( r * 0.10, -r * 0.30, r * 0.50, '#fff09e');
    ctx.globalCompositeOperation = 'source-over';
    // rim
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.lineWidth = Math.max(2, r * 0.04);
    ctx.beginPath(); ctx.arc(0, 0, r * 0.97, 0, Math.PI * 2); ctx.stroke();
    // catchlight
    const cl = ctx.createRadialGradient(-r * 0.42, -r * 0.42, 0, -r * 0.42, -r * 0.42, r * 0.42);
    cl.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
    cl.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = cl;
    ctx.beginPath(); ctx.arc(-r * 0.42, -r * 0.42, r * 0.42, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else {
    // Lots of small bubbles ascending after the pop
    const elapsed = t - popAt;
    for (let i = 0; i < 60; i++) {
      const seed = i * 53;
      const sx = (i * 137) % W;
      const speed = 180 + (Math.sin(seed) + 1) * 80;
      const sy = H + 30 - elapsed * speed - ((i * 19) % 80);
      if (sy < -40) continue;
      const wobble = Math.sin(t * 2 + i) * 18;
      const r = 8 + (Math.cos(seed) + 1) * 14;
      ctx.save();
      ctx.translate(sx + wobble, sy);
      ctx.fillStyle = 'rgba(220, 240, 255, 0.45)';
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.9, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.beginPath(); ctx.arc(-r * 0.4, -r * 0.4, r * 0.18, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }
  celebrationBanner(ctx, ['BEAUTIFUL!', 'bubbly, bubbly, bubbly'], t);
}

// Soccer — a goal! "GOOOAL!" with the ball flying into a net.
function drawSoccerCelebration(ctx, t) {
  const cx = W * 0.5, cy = H * 0.55;
  // Net shape (arc + grid lines)
  ctx.save();
  ctx.translate(cx, cy);
  const nw = Math.min(W, H) * 0.42;
  const nh = nw * 0.6;
  // Net outline
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(-nw / 2, -nh / 2);
  ctx.lineTo(-nw / 2, nh / 2);
  ctx.lineTo(nw / 2, nh / 2);
  ctx.lineTo(nw / 2, -nh / 2);
  ctx.stroke();
  // Net mesh
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 12; i++) {
    const x = -nw / 2 + (i / 12) * nw;
    ctx.beginPath();
    ctx.moveTo(x, -nh / 2); ctx.lineTo(x, nh / 2);
    ctx.stroke();
  }
  for (let i = 1; i < 8; i++) {
    const y = -nh / 2 + (i / 8) * nh;
    ctx.beginPath();
    ctx.moveTo(-nw / 2, y); ctx.lineTo(nw / 2, y);
    ctx.stroke();
  }
  ctx.restore();
  // Soccer ball flying in (from left, into the net)
  const intro = Math.min(1, t / 0.6);
  const ballX = -100 + intro * (cx + 0);
  const ballY = cy + Math.sin(intro * Math.PI) * -120;
  const ballR = 50;
  ctx.save();
  ctx.translate(ballX, ballY);
  ctx.rotate(t * 6);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(0, 0, ballR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * ballR * 0.55, Math.sin(a) * ballR * 0.55, ballR * 0.18, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.beginPath(); ctx.arc(0, 0, ballR * 0.22, 0, Math.PI * 2); ctx.fill();
  storybookOutline(ctx, ballR, 66004);
  ctx.restore();
  // Streak lines behind ball
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(ballX - 60 - i * 30, ballY + (i - 1.5) * 8);
    ctx.lineTo(ballX - 30 - i * 30, ballY + (i - 1.5) * 8);
    ctx.stroke();
  }
  celebrationBanner(ctx, ['G O O O A L!', 'voices of champions'], t);
}

// Tennis — trophy raised high, with confetti.
function drawTennisCelebration(ctx, t) {

}

function drawCelebration(ctx, dt) {
  celebration.t += dt;
  // Soft warm overlay so the celebration reads
  ctx.fillStyle = 'rgba(250, 240, 215, 0.55)';
  ctx.fillRect(0, 0, W, H);
  const t = celebration.t;
  switch (celebration.mode) {
    case 'eyeball':    drawCyclops(ctx, t); break;
    case 'watermelon': drawWatermelon(ctx, t); break;
    case 'popcorn':    drawPopcorn(ctx, t); break;
    case 'soapbubble': drawBubblesCelebration(ctx, t); break;
    case 'soccer':     drawSoccerCelebration(ctx, t); break;
    case 'tennis':     drawTennisCelebration(ctx, t); break;
    default:           drawClassicCelebration(ctx, t); break;
  }
  // Periodic confetti bursts during the celebration
  if (Math.floor(t * 2) !== Math.floor((t - dt) * 2)) {
    const x = Math.random() * W;
    const y = H * (0.3 + Math.random() * 0.5);
    for (let i = 0; i < 18; i++) {
      confetti.push(new Confetti(x, y, COLORS[Math.floor(Math.random() * COLORS.length)]));
    }
  }
  if (t >= celebration.duration) endCelebration();
}

// ===== Main loop =====
let lastFrameTime = 0;
// Rolling peak of the raw (un-amplified) mic signal — used by auto-sens to
// scale the slider so the loudest recent sound maps to ~70% loudness.
// Floored at 0.04 so silence doesn't crank sensitivity to the moon.
let rollingPeakRaw = 0.1;
function loop(now) {
  const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
  lastFrameTime = now;

  const planet = PLANETS[state.planet];
  const raw = getLoudness();

  // Track the room's ambient noise floor — slow up, faster down so quiet
  // moments pull the floor down quickly, and a sudden loud noise barely
  // raises it. Used by the auto-sens noise gate.
  if (lastRawRms < noiseFloor) {
    noiseFloor += (lastRawRms - noiseFloor) * Math.min(1, dt * 4);
  } else {
    noiseFloor += (lastRawRms - noiseFloor) * Math.min(1, dt * 0.06);
  }

  // Auto-sensitivity: only ratchets UPWARDS — when recent peaks aren't
  // reaching satisfying loudness, raise sensitivity so a normal singing
  // voice fills the meter. We deliberately never auto-lower sensitivity:
  // if the kids really crush a song, the output stays pinned at 1.0
  // (max chaos) rather than being normalized down to "average".
  // Adjusts only when there's current real signal so silence between
  // songs can't drift the gain up.
  rollingPeakRaw = Math.max(rollingPeakRaw * Math.pow(0.985, dt * 60), lastEffectiveRms, 0.03);
  if (state.autoSensitivity && lastEffectiveRms > 0.008) {
    const scaledPeak = rollingPeakRaw * state.sensitivity;
    // Boost more aggressively. We want a normal singing voice to fill ~85%
    // of the meter, so target = 0.85, and we only stop boosting once we're
    // already close to that. Approach rate is also faster (was 0.6/s).
    if (scaledPeak < 0.78) {
      const targetSens = 0.85 / Math.max(rollingPeakRaw, 0.01);
      // If the kids JUST started singing (target much higher than current),
      // ease in faster so the meter catches up within ~1 second.
      const gap = targetSens - state.sensitivity;
      const rate = gap > 1.5 ? 2.2 : 1.3;
      state.sensitivity += gap * Math.min(1, dt * rate);
      state.sensitivity = Math.max(0.5, Math.min(25, state.sensitivity));
      sensSlider.value = state.sensitivity;
      sensVal.textContent = state.sensitivity.toFixed(1) + 'x';
    }
  }

  // Screen shake — sudden loudness spikes recoil the canvas; sustained
  // peak loudness keeps a low rumble going. Decays each frame.
  const spike = Math.max(0, raw - smoothedLoudness - 0.08);
  if (spike > 0.04) screenShake.amount = Math.min(28, screenShake.amount + spike * 38);
  if (smoothedLoudness > 0.85) screenShake.amount = Math.max(screenShake.amount, (smoothedLoudness - 0.85) * 60);
  screenShake.amount *= Math.pow(0.84, dt * 60);
  if (screenShake.amount < 0.4) screenShake.amount = 0;
  // Apply via CSS transform on the canvas only — keeps the meter / buttons still
  if (screenShake.amount > 0) {
    const sx = (Math.random() - 0.5) * screenShake.amount;
    const sy = (Math.random() - 0.5) * screenShake.amount;
    canvas.style.transform = `translate(${sx.toFixed(1)}px, ${sy.toFixed(1)}px)`;
  } else if (canvas.style.transform) {
    canvas.style.transform = '';
  }

  smoothedLoudness += (raw - smoothedLoudness) * Math.min(1, dt * 15);
  peakLoudness = Math.max(peakLoudness * Math.pow(0.92, dt * 60), raw);
  fireworkCooldown = Math.max(0, fireworkCooldown - dt);

  meterFill.style.width = (smoothedLoudness * 100) + '%';

  drawBackground(planet, dt);

  // Trebuchet mode takes over the screen — no balls/spawning/splat/confetti.
  if (state.ballMode === 'trebuchet') {
    trebUpdate(dt, raw, smoothedLoudness, peakLoudness);
    updateFinishBtn();
    trebDraw(ctx, dt);
    applyPaperOverlay(ctx);
    requestAnimationFrame(loop);
    return;
  }

  // Glow rings on loud
  if (smoothedLoudness > 0.3) {
    for (let r = 0; r < 3; r++) {
      ctx.beginPath();
      ctx.arc(W/2, H/2, 100 + r * 80 + smoothedLoudness * 40, 0, Math.PI * 2);
      ctx.strokeStyle = COLORS[Math.floor((Date.now()/200 + r) % COLORS.length)];
      ctx.globalAlpha = smoothedLoudness * 0.12;
      ctx.lineWidth = 4;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ===== Dynamic ball count =====
  // When locked: target = exact slider value.
  // When unlocked: slider value is the MIN. Count grows from there with loudness,
  // up to the slider's max ceiling.
  let targetCount;
  // Soap bubbles always scale with loudness (more singing → more bubbles
  // blow in), regardless of the lock.
  if (state.ballMode === 'soapbubble' || !state.ballCountLock) {
    const lvl = Math.max(smoothedLoudness, peakLoudness * 0.7);
    const min = state.ballCount;
    const ceiling = parseInt(countSlider.max, 10);
    // Steeper ramp — even moderate singing visibly fills the screen.
    targetCount = Math.round(min + (ceiling - min) * Math.min(1, lvl * 2.2));
  } else {
    targetCount = state.ballCount;
  }
  spawnAcc += dt;
  // Spawn faster when louder so a big moment visibly multiplies eyeballs.
  // Bubbles always spawn quickly; everything else accelerates with volume.
  const lvlForSpawn = Math.max(smoothedLoudness, peakLoudness * 0.6);
  const spawnInterval = state.ballMode === 'soapbubble'
    ? 0.04
    : Math.max(0.04, 0.1 - lvlForSpawn * 0.08);
  if (spawnAcc > spawnInterval) {
    const active = balls.reduce((n, b) => n + (b.dormant ? 0 : 1), 0);
    if (active < targetCount) {
      // Prefer waking a dormant ball (still on screen) before spawning a new one
      if (!wakeOne()) spawnFromSide();
      spawnAcc = 0;
    } else if (active > targetCount) {
      sendOneAway();
      spawnAcc = 0;
    }
  }

  // Use peak loudness so a quick "AHH!" still launches balls that hit the floor
  // a moment later, before the spike decays.
  const launchLoudness = Math.max(raw, peakLoudness * 0.7);
  for (const b of balls) {
    b.update(dt, planet, state.restitution, launchLoudness, state.ballMode);
    if (!b.splatted) b.draw(ctx, state.ballMode);
  }
  // Remove splatted balls (they get replaced by the dynamic spawn system next tick)
  balls = balls.filter(b => !b.splatted);
  // Remove dormant balls that have rolled fully off-screen
  balls = balls.filter(b => !(b.dormant && (b.x < -b.radius * 2 - 60 || b.x > W + b.radius * 2 + 60)));

  // Update + draw splats
  for (let i = splats.length - 1; i >= 0; i--) {
    splats[i].update(dt, planet);
    splats[i].draw(ctx);
    if (splats[i].done) splats.splice(i, 1);
  }

  // ===== SHARKS (Underwater only) — when the kids sing loud, a shark =====
  // cruises across the screen and eats one or two eyeballs as it passes.
  sharkCooldown = Math.max(0, sharkCooldown - dt);
  if (state.planet === 'water') {
    const sharkLevel = Math.max(peakLoudness, smoothedLoudness * 1.05);
    if (sharkLevel > 0.55 && sharkCooldown <= 0 && sharks.length < 2) {
      sharks.push(new Shark());
      // Cooldown shorter when really loud so a chorus brings a feeding frenzy
      sharkCooldown = sharkLevel > 0.85 ? 2.5 : 4.5;
    }
    for (let i = sharks.length - 1; i >= 0; i--) {
      sharks[i].update(dt);
      sharks[i].tryEat(balls);
      sharks[i].draw(ctx);
      if (sharks[i].dead) sharks.splice(i, 1);
    }
  } else if (sharks.length) {
    // Switched away from underwater — clear any in-progress sharks
    sharks.length = 0;
  }

  // (Firework eyeballs were removed — louder singing now just spawns more
  // eyeballs through the dynamic count system below.)

  spawnConfetti(smoothedLoudness);
  for (let i = confetti.length - 1; i >= 0; i--) {
    confetti[i].update(dt, planet);
    confetti[i].draw(ctx);
    if (confetti[i].life <= 0 || confetti[i].y > H + 50) confetti.splice(i, 1);
  }

  showEncouragement(smoothedLoudness);

  // Celebration overlay (drawn before paper texture so it picks up the grain)
  if (celebration.active) drawCelebration(ctx, dt);

  // Storybook finishing pass — warm paper grain over everything.
  applyPaperOverlay(ctx);

  requestAnimationFrame(loop);
}

// ===== Settings UI wiring =====
function buildModeButtons(containerId, options, currentKey, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  for (const [key, label] of Object.entries(options)) {
    const btn = document.createElement('button');
    btn.className = 'modeBtn' + (key === currentKey ? ' active' : '');
    btn.textContent = label;
    btn.dataset.key = key;
    btn.onclick = () => {
      onSelect(key);
      [...container.children].forEach(c => c.classList.toggle('active', c.dataset.key === key));
    };
    container.appendChild(btn);
  }
}
buildModeButtons('ballModes', BALL_MODES, state.ballMode, (k) => {
  const prev = state.ballMode;
  state.ballMode = k;
  // When switching into or out of bubble mode, reseed so balls start in
  // a sensible state (bubbles scattered + rising, others on the floor).
  if (k === 'soapbubble' || prev === 'soapbubble') {
    seedBalls(state.ballCount);
  }
  // Switching INTO trebuchet starts a fresh game; switching OUT resets too
  // so it's ready next time.
  if (k === 'trebuchet' || prev === 'trebuchet') trebReset();
  updateFinishBtn();
});

// Trebuchet projectile picker — choose what the catapult flings.
// Excludes 'soapbubble' (floats) and 'trebuchet' (recursive).
const TREB_PROJECTILES = {
  eyeball:    'Eyeball',
  classic:    'Classic',
  tennis:     'Tennis',
  watermelon: 'Watermelon',
  soccer:     'Soccer',
  popcorn:    'Popcorn',
};
buildModeButtons('projectileModes', TREB_PROJECTILES, state.trebProjectile, (k) => {
  state.trebProjectile = k;
});

// Trebuchet: click anywhere on the canvas hits the on-screen button. Space
// also releases / resets, so kids can mash any key.
canvas.addEventListener('click', (e) => {
  if (state.ballMode !== 'trebuchet') return;
  const rect = canvas.getBoundingClientRect();
  trebHandleClick(e.clientX - rect.left, e.clientY - rect.top);
});
window.addEventListener('keydown', (e) => {
  if (state.ballMode !== 'trebuchet') return;
  if (e.code !== 'Space' && e.code !== 'Enter') return;
  e.preventDefault();
  if (treb.phase === 'cocking') trebFire();
  else if (treb.phase === 'landed' || treb.phase === 'broken') trebReset();
});
buildModeButtons(
  'planetModes',
  Object.fromEntries(Object.entries(PLANETS).map(([k, v]) => [k, v.name])),
  state.planet,
  (k) => state.planet = k
);

const sensSlider = document.getElementById('sensSlider');
const sensVal = document.getElementById('sensVal');
sensSlider.addEventListener('input', () => {
  state.sensitivity = parseFloat(sensSlider.value);
  sensVal.textContent = state.sensitivity.toFixed(1) + 'x';
  // Manually moving the slider implies you want manual control.
  if (state.autoSensitivity) {
    state.autoSensitivity = false;
    refreshAutoSensBtn();
  }
});

const autoSensBtn = document.getElementById('autoSensBtn');
function refreshAutoSensBtn() {
  if (state.autoSensitivity) {
    autoSensBtn.classList.add('locked');
    autoSensBtn.textContent = 'Auto: matches the room';
  } else {
    autoSensBtn.classList.remove('locked');
    autoSensBtn.textContent = 'Manual';
  }
}
autoSensBtn.addEventListener('click', () => {
  state.autoSensitivity = !state.autoSensitivity;
  refreshAutoSensBtn();
});
refreshAutoSensBtn();

const countSlider = document.getElementById('countSlider');
const countVal = document.getElementById('countVal');
countSlider.addEventListener('input', () => {
  state.ballCount = parseInt(countSlider.value, 10);
  countVal.textContent = state.ballCount;
  // The main loop handles smoothly spawning or sending balls away.
});

const lockBtn = document.getElementById('lockBtn');
function refreshLockBtn() {
  if (state.ballCountLock) {
    lockBtn.classList.add('locked');
    lockBtn.textContent = 'Locked at fixed count';
  } else {
    lockBtn.classList.remove('locked');
    lockBtn.textContent = 'Auto: grows with loudness';
  }
}
lockBtn.addEventListener('click', () => {
  state.ballCountLock = !state.ballCountLock;
  refreshLockBtn();
});
refreshLockBtn();

const bounceSlider = document.getElementById('bounceSlider');
const bounceVal = document.getElementById('bounceVal');
bounceSlider.addEventListener('input', () => {
  state.restitution = parseFloat(bounceSlider.value);
  bounceVal.textContent = state.restitution.toFixed(2);
});

settingsToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  settings.classList.toggle('hidden');
});
// Click anywhere outside the panel (or press Escape) to close it.
// Clicks INSIDE the panel are stopped from bubbling so they don't close it.
settings.addEventListener('click', (e) => e.stopPropagation());
document.addEventListener('click', () => {
  if (!settings.classList.contains('hidden')) settings.classList.add('hidden');
});
document.addEventListener('touchstart', (e) => {
  if (settings.classList.contains('hidden')) return;
  if (settings.contains(e.target) || e.target === settingsToggle) return;
  settings.classList.add('hidden');
}, { passive: true });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !settings.classList.contains('hidden')) {
    settings.classList.add('hidden');
  }
});

// Finish button does double duty:
//   normal modes  → "Finish!"      → triggers the celebration
//   trebuchet cocking → "Release!" → fires the trebuchet
//   trebuchet landed  → "Throw Again" → resets the trebuchet
//   trebuchet mid-flight → hidden (release in progress)
const finishBtnEl = document.getElementById('finishBtn');
function updateFinishBtn() {
  if (state.ballMode === 'trebuchet') {
    if (treb.phase === 'cocking') {
      finishBtnEl.textContent = 'Release!';
      finishBtnEl.classList.remove('hidden');
    } else if (treb.phase === 'landed' || treb.phase === 'broken') {
      finishBtnEl.textContent = 'Throw Again';
      finishBtnEl.classList.remove('hidden');
    } else {
      finishBtnEl.classList.add('hidden');
    }
  } else {
    finishBtnEl.textContent = 'Finish!';
    // The normal mode show/hide rule (start screen, celebration, etc.) is
    // handled elsewhere — leave that alone.
  }
}
finishBtnEl.addEventListener('click', () => {
  if (state.ballMode === 'trebuchet') {
    if (treb.phase === 'cocking') trebFire();
    else if (treb.phase === 'landed' || treb.phase === 'broken') trebReset();
    return;
  }
  startCelebration();
});
</script>
