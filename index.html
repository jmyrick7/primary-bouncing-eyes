<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1f4e">
<title>Sing Louder! Bouncing Balls</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: white;
    background: #0a0e27;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    /* Use the small viewport on browsers that support it so the canvas
       never extends underneath iOS Safari's URL bar / bottom toolbar.
       Falls back to 100vh on older browsers. */
    height: 100svh;
  }
  #startScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    text-align: center;
    padding: 20px;
  }
  #startScreen h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    margin: 0 0 20px;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff, #c780ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #startScreen p {
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    margin: 10px 0 30px;
    max-width: 700px;
  }
  .bigBtn {
    font-size: clamp(1.2rem, 3vw, 2rem);
    padding: 20px 50px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d);
    color: #1a1f4e;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
    transition: transform 0.2s;
  }
  .bigBtn:hover { transform: scale(1.05); }

  #meter {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 220px;
    height: 18px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
    z-index: 5;
    backdrop-filter: blur(4px);
  }
  #meterFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6bcf7f, #ffd93d, #ff6b6b);
    transition: width 0.05s linear;
  }
  #meterLabel {
    position: fixed;
    top: 38px;
    left: 16px;
    font-size: 0.85rem;
    opacity: 0.7;
    z-index: 5;
  }

  #encourage {
    position: fixed;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(2rem, 7vw, 6rem);
    font-weight: 900;
    text-shadow: 0 0 30px rgba(255,255,255,0.6);
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.3s;
    opacity: 0;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff, #c780ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }

  #settingsToggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  #settingsToggle:hover { background: rgba(0,0,0,0.7); }

  #finishBtn {
    position: fixed;
    top: 12px;
    /* Volume meter is 16px from left and 220px wide → sits just to its right */
    left: 248px;
    z-index: 20;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.25);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.04em;
    backdrop-filter: blur(6px);
    font-family: inherit;
    opacity: 0.7;
  }
  #finishBtn:hover { opacity: 1; background: rgba(255, 255, 255, 0.2); }
  #finishBtn.hidden { display: none; }

  #settings {
    position: fixed;
    top: 70px;
    right: 16px;
    width: 320px;
    max-height: calc(100vh - 90px);
    overflow-y: auto;
    background: rgba(15, 20, 50, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 18px;
    z-index: 15;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    transition: opacity 0.2s, transform 0.2s;
  }
  #settings.hidden {
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
  }
  #settings h3 {
    margin: 0 0 6px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }
  .group { margin-bottom: 16px; }
  .sliderRow {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sliderRow input[type=range] {
    flex: 1;
    accent-color: #ffd93d;
  }
  .sliderRow .val {
    width: 44px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 0.9rem;
    opacity: 0.85;
  }
  .modeGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .modeBtn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 8px 4px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modeBtn:hover { background: rgba(255,255,255,0.18); }
  .modeBtn.active {
    background: linear-gradient(90deg, #ff6b6b, #ffd93d);
    color: #1a1f4e;
    font-weight: 700;
    border-color: transparent;
  }
  .lockBtn {
    margin-top: 8px;
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 9px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .lockBtn:hover { background: rgba(255,255,255,0.18); }
  .lockBtn.locked {
    background: linear-gradient(90deg, #ffd93d, #6bcf7f);
    color: #1a1f4e;
    font-weight: 700;
    border-color: transparent;
  }

  /* ===== Mobile / small-screen optimizations ===== */
  @media (max-width: 720px), (pointer: coarse) {
    body {
      /* Avoid the iOS rubber-band scroll while playing */
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    /* Tappable controls — min 44px target per Apple guidelines */
    #settingsToggle {
      width: 44px;
      height: 44px;
      font-size: 22px;
      top: 10px;
      right: 10px;
    }
    #finishBtn {
      top: auto;
      bottom: 12px;
      left: 12px;
      font-size: 14px;
      padding: 10px 18px;
      opacity: 0.92;
    }
    /* Volume meter — slim along the top so it doesn't crowd the canvas */
    #meter {
      top: 10px;
      left: 64px;          /* clear of the gear button */
      right: 64px;
      width: auto;
      height: 10px;
    }
    #meterLabel {
      top: 24px;
      left: 64px;
      font-size: 10px;
    }
    #encourage {
      font-size: clamp(28px, 9vw, 56px);
    }
    /* Settings panel slides up from the bottom as a sheet */
    #settings {
      top: auto;
      right: 0;
      left: 0;
      bottom: 0;
      width: auto;
      max-height: 70vh;
      border-radius: 16px 16px 0 0;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s, opacity 0.2s;
    }
    #settings.hidden {
      transform: translateY(100%);
      opacity: 1;        /* slide instead of fade */
    }
    /* Bigger touch targets in the panel */
    .modeBtn {
      padding: 12px 6px;
      font-size: 0.9rem;
      min-height: 44px;
    }
    .modeGrid {
      gap: 8px;
      grid-template-columns: repeat(2, 1fr);
    }
    .lockBtn {
      padding: 12px;
      font-size: 0.95rem;
      min-height: 44px;
    }
    .sliderRow input[type=range] {
      height: 32px;       /* easier to grab */
    }
    .sliderRow .val {
      font-size: 1rem;
    }
    /* Start screen text scales for narrow screens */
    #startScreen h1 { font-size: clamp(28px, 8vw, 56px); padding: 0 16px; }
    #startScreen p  { font-size: clamp(14px, 4vw, 18px); padding: 0 16px; max-width: 90vw; }
  }

</style>
</head>
<body>

<div id="startScreen">
  <h1>Sing Louder, Bounce Higher!</h1>
  <p>Click the button, then allow microphone access. The louder the kids sing, the higher the balls bounce!</p>
  <button id="startBtn" class="bigBtn">Start the Fun!</button>
</div>

<canvas id="canvas"></canvas>

<div id="meter"><div id="meterFill"></div></div>
<div id="meterLabel">Volume</div>
<div id="encourage"></div>

<button id="settingsToggle" title="Settings">&#9881;</button>
<button id="finishBtn" class="hidden">Finish!</button>

<div id="settings" class="hidden">
  <div class="group">
    <h3>Mic Sensitivity</h3>
    <div class="sliderRow">
      <input type="range" id="sensSlider" min="0.5" max="25" step="0.1" value="3">
      <div class="val" id="sensVal">2.5x</div>
    </div>
    <button id="autoSensBtn" class="lockBtn">Manual</button>
  </div>

  <div class="group">
    <h3>Number of Balls</h3>
    <div class="sliderRow">
      <input type="range" id="countSlider" min="1" max="60" step="1" value="1">
      <div class="val" id="countVal">1</div>
    </div>
    <button id="lockBtn" class="lockBtn locked">Locked at fixed count</button>
  </div>

  <div class="group">
    <h3>Ball Style</h3>
    <div class="modeGrid" id="ballModes"></div>
  </div>

  <div class="group">
    <h3>Planet</h3>
    <div class="modeGrid" id="planetModes"></div>
  </div>

  <div class="group" id="projectileGroup">
    <h3>Trebuchet Projectile</h3>
    <div class="modeGrid" id="projectileModes"></div>
  </div>

  <div class="group">
    <h3>Bounciness</h3>
    <div class="sliderRow">
      <input type="range" id="bounceSlider" min="0.4" max="0.99" step="0.01" value="0.92">
      <div class="val" id="bounceVal">0.92</div>
    </div>
  </div>
</div>

<script>
// ===== Setup =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const meterFill = document.getElementById('meterFill');
const encourage = document.getElementById('encourage');
const startBtn = document.getElementById('startBtn');
const startScreen = document.getElementById('startScreen');
const settingsToggle = document.getElementById('settingsToggle');
const settings = document.getElementById('settings');

let W, H;
function resize() {
  // Use the canvas's actual rendered size so the floor stays visible
  // even when iOS Safari's chrome is overlaid on the page.
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = Math.round(rect.width);
  H = canvas.height = Math.round(rect.height);
}
window.addEventListener('resize', resize);
// iOS Safari occasionally lags resize on rotate; force one a moment later.
window.addEventListener('orientationchange', () => {
  setTimeout(resize, 250);
});
resize();

// ===== Settings state =====
const state = {
  sensitivity: 3,
  autoSensitivity: true,
  ballCount: 1,
  ballCountLock: false,
  ballMode: 'eyeball',
  trebProjectile: 'eyeball',  // what the trebuchet flings (and what becomes the cyclops's eye)
  planet: 'earth',
  restitution: 0.92,
};

// ===== Planets (gravity in px/s^2 plus visual style) =====
// Real gravity ratios applied to a base of ~2200 px/s^2 (feels right at TV sizes)
const BASE_G = 2200;
const PLANETS = {
  earth:   { name: 'Earth',   gMul: 1.00, drag: 0.999, bg: ['#0a0e27', '#1a1f4e', '#2d1b69'] },
  moon:    { name: 'Moon',    gMul: 0.165, drag: 0.999, bg: ['#1a1a2e', '#2c2c44', '#4a4a5e'] },
  space:   { name: 'Space',   gMul: 0.00, drag: 0.998, bg: ['#000000', '#08081a', '#0d0d2b'] },
  water:   { name: 'Underwater', gMul: 0.25, drag: 0.97, bg: ['#001a33', '#003366', '#0066aa'] },
};

// ===== Ball modes =====
const BALL_MODES = {
  classic:    'Classic',
  soccer:     'Soccer',
  eyeball:    'Eyeballs',
  watermelon: 'Watermelon',
  tennis:     'Tennis',
  popcorn:    'Popcorn',
  soapbubble: 'Bubbles',
  trebuchet:  'Trebuchet (game)',
};

// ===== Trebuchet game =====
// Phases:
//   'cocking'   — singing winds the long arm down (sling lowers, counterweight rises)
//   'releasing' — short whip animation when the user fires
//   'flying'    — the eyeball is airborne; camera follows it; benchmarks scroll past
//   'landed'    — final distance shown; "Throw Again" button to reset
const TREB = {
  G_FT:  13,        // gravity unit/s² (low → longer hang time, leisurely flight)
  MAX_V: 220,       // unit/s at full charge → ~3000 mi for 100%, peaks ~4000 with overcharge
  CHARGE_RATE: 0.18, // charge per second at loudness=1.0 (a typical song should fully charge)
  RELEASE_DUR: 0.45, // seconds the whip animation takes
  RELEASE_AT: 0.62,  // releaseT at which the sling lets go (sling tip ≈ +45°)
  PX_PER_FT: 2.4,    // world-foot to screen-pixel during flight (faster scroll)
  LAUNCH_ANGLE: Math.PI / 9, // 20° — shallow so the eyeball cruises high, not pops up
};
const treb = {
  phase: 'cocking',
  charge: 0,                  // 0..1.5
  releaseT: 0,                // 0..1 progress through release animation
  // After flight starts, position is in WORLD FEET. ground = y = 0.
  fx: 0, fy: 0,               // ft (relative to launch point)
  vx: 0, vy: 0,               // ft/s
  rotation: 0,                // visual eyeball rotation
  rotVel: 0,
  distance: 0,                // final landed distance, ft
  // Computed once on release so flight uses fixed initial v
  releaseV: 0,
  flightAnchorX: 0,           // where the flying eyeball sits on screen (eased over time)
  sailing: false,             // true if eyeball landed on the Mayflower (ship sails away)
  shipFt: 0,                  // world-ft of the Mayflower while sailing
  brokenAt: 0,                // perf.now() when the trebuchet broke (for animations)
  pieces: [],                 // wreckage pieces with physics during 'broken' phase
  birds: [],                  // crows perched on the barrel adding visual weight
  birdSpawnT: 0,              // throttle timer for spawning new birds
  chargeMsgTier: -1,          // which encouragement tier is currently shown
  chargeMsgChangedAt: 0,      // perf.now() when tier changed (drives pop animation)
};

// Encouragement tiers shown above the charge bar — the message changes and
// pops in as the kids sing past each threshold.
const TREB_CHARGE_TIERS = [
  { min: 0.00, msg: 'Sing!',           color: '#ffffff' },
  { min: 0.15, msg: 'Louder!',         color: '#fff8d6' },
  { min: 0.35, msg: 'Keep going!',     color: '#ffe066' },
  { min: 0.55, msg: 'GREAT singing!',  color: '#ffc94d' },
  { min: 0.75, msg: 'ALMOST READY!',   color: '#ff9c4d' },
  { min: 1.00, msg: 'POWER UP!',       color: '#ff6b6b' },
  { min: 1.50, msg: 'OFF THE CHARTS!', color: '#ff4dd6' },
  { min: 2.00, msg: 'DANGER ZONE!',    color: '#ff3838' },
];
function trebChargeTier(charge) {
  let idx = 0;
  for (let i = TREB_CHARGE_TIERS.length - 1; i >= 0; i--) {
    if (charge >= TREB_CHARGE_TIERS[i].min) { idx = i; break; }
  }
  return idx;
}
function trebReset() {
  treb.phase = 'cocking';
  treb.charge = 0;
  treb.releaseT = 0;
  treb.fx = 0; treb.fy = 0;
  treb.vx = 0; treb.vy = 0;
  treb.rotation = 0; treb.rotVel = 0;
  treb.distance = 0;
  treb.releaseV = 0;
  treb.flightAnchorX = 0;
  treb.sailing = false;
  treb.shipFt = 0;
  treb.brokenAt = 0;
  treb.pieces = [];
  treb.birds = [];
  treb.birdSpawnT = 0;
  treb.chargeMsgTier = -1;
  treb.chargeMsgChangedAt = 0;
  splats.length = 0;          // clear pumpkin/eyeball pieces from prior throws
  fireworks.length = 0;       // clear any in-flight fireworks too
}
function trebFire() {
  if (treb.phase !== 'cocking' || treb.charge < 0.05) return;
  // Easter egg — at 249%+ charge, the arm snaps and the whole thing breaks.
  if (treb.charge >= 2.49) {
    treb.phase = 'broken';
    treb.brokenAt = performance.now();
    initBrokenPieces();
    return;
  }
  treb.phase = 'releasing';
  treb.releaseT = 0;
  treb.releaseV = TREB.MAX_V * Math.sqrt(treb.charge);
}

// Cocking parameter 0..1 → drives long-arm angle.
//   0  : arm horizontal (idle, sling at standby)
//   1  : arm fully cocked (sling on ground, counterweight up high)
function trebArmAngle(cock, releaseT) {
  // Math convention: theta measured CCW from +x. sin(theta) up = positive.
  //   idle (charge=0):   90°   long arm vertical, pointing UP
  //   cocked (charge=1): ~213° long arm drooping back-and-down (sling on ground behind)
  // Cocking sweeps CCW (theta increases). On release the arm whips CW
  // (theta decreases) all the way around through forward, ending past
  // horizontal forward.
  const idle = Math.PI / 2;
  const cocked = Math.PI * 1.18;
  const theta = idle + (cocked - idle) * cock;
  if (releaseT <= 0) return theta;
  const releaseEnd = -Math.PI / 6; // -30° (just past horizontal forward)
  const e = releaseT < 0.5
    ? 4 * releaseT * releaseT * releaseT
    : 1 - Math.pow(-2 * releaseT + 2, 3) / 2;
  return theta + (releaseEnd - theta) * e;
}

// Trebuchet pivot location and arm dimensions, as a function of canvas size.
function trebGeom() {
  // On portrait phones the screen is narrow, so scale the trebuchet much
  // bigger relative to width — and use vertical room for the long arm.
  const portrait = H > W;
  const groundY = H * (portrait ? 0.78 : 0.85);
  const baseHalf = portrait
    ? Math.min(190, W * 0.20)
    : Math.min(190, W * 0.105);
  const pivotX = W * 0.5;                       // mid-screen so cocked arm has room going LEFT
  const pivotY = groundY - baseHalf * 1.55;     // top of A-frame
  const longLen = portrait
    ? Math.min(440, Math.min(W * 0.5, H * 0.28))
    : Math.min(440, W * 0.27);
  const shortLen = longLen * 0.42;
  return { groundY, baseHalf, pivotX, pivotY, longLen, shortLen };
}

function trebUpdate(dt, raw, smoothed, peak) {
  if (treb.phase === 'cocking') {
    // Charge accumulates with louder singing. Use the bigger of raw/smoothed
    // so a sustained sing AND quick spikes both build it.
    const drive = Math.max(smoothed, peak * 0.6);
    treb.charge += drive * TREB.CHARGE_RATE * dt;
    treb.charge = Math.min(2.5, treb.charge);
    // Birds — once the sling has touched the ground (charge > ~0.5), crows
    // flutter in and perch on the barrel. Each one is a little extra "weight."
    const targetBirds = Math.min(8, Math.max(0, Math.floor((treb.charge - 0.5) * 7)));
    treb.birdSpawnT += dt;
    if (treb.birds.length < targetBirds && treb.birdSpawnT > 0.55) {
      treb.birdSpawnT = 0;
      const idx = treb.birds.length;
      const slots = Math.max(targetBirds, 6);
      const perchOffsetX = ((idx + 0.5) / slots - 0.5) * 78 + (Math.random() - 0.5) * 10;
      const perchOffsetY = -28 + (Math.random() - 0.5) * 3;
      const fromLeft = Math.random() < 0.5;
      treb.birds.push({
        x: fromLeft ? -40 : W + 40,
        y: H * (0.10 + Math.random() * 0.18),
        perched: false,
        perchOffsetX,
        perchOffsetY,
        flapPhase: Math.random() * Math.PI * 2,
        scale: 0.9 + Math.random() * 0.35,
        color: ['#15151a', '#252528', '#1c1c1e'][Math.floor(Math.random() * 3)],
      });
    }
  }
  else if (treb.phase === 'releasing') {
    treb.releaseT += dt / TREB.RELEASE_DUR;
    // Sling lets go around the time the sling-tip is up-and-forward (~45°),
    // so the eyeball naturally launches in that direction.
    if (treb.releaseT >= TREB.RELEASE_AT) {
      treb.phase = 'flying';
      treb.releaseT = 1;
      const angle = TREB.LAUNCH_ANGLE;
      treb.vx = treb.releaseV * Math.cos(angle);
      treb.vy = treb.releaseV * Math.sin(angle);
      treb.fx = 0;
      treb.rotVel = 6 + Math.random() * 4;
      // Snap both the camera anchor AND the starting altitude to the sling
      // tip's current screen position — flight begins exactly where the
      // release animation left off, eyeball already up high.
      const g = trebGeom();
      const slingLen = g.longLen * 0.45;
      const theta = trebArmAngle(1, TREB.RELEASE_AT);
      const lag = (1 - TREB.RELEASE_AT) * (Math.PI / 3);
      const trailTheta = theta + lag;
      const launchScreenX = g.pivotX + Math.cos(trailTheta) * (g.longLen + slingLen);
      const launchScreenY = g.pivotY - Math.sin(trailTheta) * (g.longLen + slingLen);
      treb.flightAnchorX = launchScreenX;
      treb.fy = Math.max(0, (g.groundY - launchScreenY) / TREB.PX_PER_FT);
      // Guaranteed Mayflower landing: at 200%+ charge, tune vx so the eyeball
      // touches down exactly on the ship's deck (no overshoot).
      if (treb.charge >= 2.0) {
        const mayflower = TREB_LANDMARKS.find(l => l.water);
        if (mayflower) {
          // Solve for landing time given vy and launch height: 0 = fy + vy*t - 0.5*g*t²
          const tLand = (treb.vy + Math.sqrt(treb.vy * treb.vy + 2 * TREB.G_FT * treb.fy)) / TREB.G_FT;
          treb.vx = mayflower.ft / tLand;
        }
      }
    }
  }
  else if (treb.phase === 'flying') {
    treb.vy -= TREB.G_FT * dt;
    treb.fx += treb.vx * dt;
    treb.fy += treb.vy * dt;
    treb.rotation += treb.rotVel * dt;
    // Eyeball stays roughly centered while world scrolls under it.
    const targetAnchor = W * 0.5;
    treb.flightAnchorX += (targetAnchor - treb.flightAnchorX) * Math.min(1, dt * 1.4);
    if (treb.fy <= 0 && treb.vy < 0) {
      treb.phase = 'landed';
      treb.distance = Math.round(treb.fx);
      treb.fy = 0;
      treb.vx = 0; treb.vy = 0;
      // If we landed at or past the Mayflower, the eyeball lands ON the ship —
      // ship starts sailing instead of splatting on water.
      const mayflower = TREB_LANDMARKS.find(l => l.water);
      if (mayflower && treb.fx >= mayflower.ft - 60) {
        treb.sailing = true;
        treb.shipFt = mayflower.ft;
        treb.fx = mayflower.ft;     // snap eyeball to ship
      } else {
        // Normal land splat
        const screen = trebFlightScreenPos();
        splats.push(new Splat(screen.x, 76, state.trebProjectile, '#4d96ff'));
      }
    }
  }
  else if (treb.phase === 'landed' && treb.sailing) {
    // Ship sails forward steadily, eyeball rides along
    const SAIL_SPEED = 55; // ft/s
    treb.shipFt += SAIL_SPEED * dt;
    treb.fx = treb.shipFt;
  }
  else if (treb.phase === 'broken') {
    // Wreckage falls + tumbles + settles in real time
    updateBrokenPieces(dt);
  }

  // Bird positions — runs ALONGSIDE the phase logic above (not as part of the
  // if/else-if chain). Birds ride the barrel as it lifts during cocking and
  // stay perched briefly while the arm whips through release.
  if (treb.phase === 'cocking' || treb.phase === 'releasing') {
    const barrel = trebBarrelPos();
    for (const b of treb.birds) {
      b.flapPhase += dt * (b.perched ? 0.5 : 14);
      if (!b.perched) {
        const targetX = barrel.x + b.perchOffsetX;
        const targetY = barrel.y + b.perchOffsetY;
        const dx = targetX - b.x;
        const dy = targetY - b.y;
        const d = Math.hypot(dx, dy);
        if (d < 6) { b.perched = true; b.x = targetX; b.y = targetY; }
        else {
          const speed = 340;
          b.x += (dx / d) * speed * dt;
          b.y += (dy / d) * speed * dt;
        }
      } else {
        b.x = barrel.x + b.perchOffsetX;
        b.y = barrel.y + b.perchOffsetY;
      }
    }
  }
}

// Convert flight world feet → on-screen pixel position (camera follows the eyeball).
function trebFlightScreenPos() {
  const g = trebGeom();
  // Clamp to the top so a tall arc never escapes the canvas.
  const rawY = g.groundY - treb.fy * TREB.PX_PER_FT;
  return { x: treb.flightAnchorX, y: Math.max(70, rawY) };
}

// World-feet to screen-x for any given foot offset (used by benchmarks).
function trebWorldToScreenX(worldFt) {
  return treb.flightAnchorX + (worldFt - treb.fx) * TREB.PX_PER_FT;
}

// LDS landmark silhouettes drawn along the ground — the eyeball flies over
// these. Few, recognizable, properly scaled relative to each other.
const TREB_LANDMARKS = [
  { ft: 700,  draw: drawSLCTemple,        label: 'Salt Lake Temple' },
  { ft: 1400, draw: drawMtTimpanogos,     label: 'Mt. Timpanogos' },
  { ft: 2000, draw: drawPioneerHandcarts, label: 'Pioneer Handcarts' },
  { ft: 2600, draw: drawSacredGrove,      label: 'Sacred Grove' },
  { ft: 4400, draw: drawMayflower,        label: 'The Mayflower', water: true },
];
// Distance threshold past which we're "at sea" — switches the ground band to ocean.
const OCEAN_START_FT = 4100;

// === Landmark renderers (origin = ground level under the building) ===

// Original 1972 Provo Temple: wide oval/lens-shaped main building with
// vertical fluted columns, a tall thin central spire, and Moroni on top.
function drawProvoTemple(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#7a6a4a';
  ctx.lineWidth = 1.4;
  // Wide flat platform/base
  ctx.fillStyle = '#e8e0c8';
  ctx.fillRect(-120, -14, 240, 14);
  ctx.strokeRect(-120, -14, 240, 14);
  // Lower oval skirt
  ctx.fillStyle = '#f1ead0';
  ctx.beginPath();
  ctx.ellipse(0, -22, 110, 12, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // Main oval body (the lens-shaped chapel)
  ctx.fillStyle = '#f8f1da';
  ctx.beginPath();
  ctx.ellipse(0, -56, 100, 38, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // Vertical fluting (thin pillared bands across the oval)
  ctx.strokeStyle = 'rgba(120, 100, 70, 0.55)';
  ctx.lineWidth = 1;
  for (let i = -9; i <= 9; i++) {
    const px = i * 10;
    if (Math.abs(px) > 96) continue;
    const dy = 38 * Math.sqrt(1 - (px / 100) ** 2);
    ctx.beginPath();
    ctx.moveTo(px, -56 - dy + 3);
    ctx.lineTo(px, -56 + dy - 3);
    ctx.stroke();
  }
  // Tall thin central spire (a pillar with subtle banding)
  ctx.fillStyle = '#fffaea';
  ctx.strokeStyle = '#7a6a4a';
  ctx.lineWidth = 1.2;
  ctx.fillRect(-4, -150, 8, 56);
  ctx.strokeRect(-4, -150, 8, 56);
  // Spire taper
  ctx.fillStyle = '#fffaea';
  ctx.beginPath();
  ctx.moveTo(-4, -150);
  ctx.lineTo(0, -178);
  ctx.lineTo(4, -150);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Bands near the top of the spire
  ctx.beginPath(); ctx.moveTo(-5, -135); ctx.lineTo(5, -135); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5, -125); ctx.lineTo(5, -125); ctx.stroke();
  // Moroni
  ctx.fillStyle = '#e6c14a';
  ctx.beginPath();
  ctx.moveTo(0, -190);
  ctx.lineTo(-3, -178);
  ctx.lineTo(3, -178);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Salt Lake Temple: 6 corner spires + tall central spire with Moroni,
// crenellated body, vertical buttresses, arched windows.
function drawSLCTemple(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#6e5e44';
  ctx.lineWidth = 1.4;
  // Granite body
  ctx.fillStyle = '#d4c8b0';
  ctx.fillRect(-130, -100, 260, 100);
  ctx.strokeRect(-130, -100, 260, 100);
  // Vertical buttress columns
  ctx.fillStyle = '#cabe9e';
  for (let i = -5; i <= 5; i++) {
    const px = i * 26;
    ctx.fillRect(px - 4, -100, 8, 100);
    ctx.strokeRect(px - 4, -100, 8, 100);
  }
  // Battlement crenellations along the top
  ctx.fillStyle = '#d4c8b0';
  for (let i = -130; i < 130; i += 18) {
    ctx.fillRect(i + 2, -110, 11, 10);
    ctx.strokeRect(i + 2, -110, 11, 10);
  }
  // Arched windows (3 rows between buttresses)
  ctx.fillStyle = 'rgba(60, 80, 110, 0.45)';
  for (let row = 0; row < 3; row++) {
    const wy = -90 + row * 28;
    for (let i = -4; i <= 4; i++) {
      const cx = i * 26 + 13;
      if (i === 4) continue; // right edge
      // arched-top window
      ctx.beginPath();
      ctx.moveTo(cx - 5, wy + 18);
      ctx.lineTo(cx - 5, wy + 5);
      ctx.arc(cx, wy + 5, 5, Math.PI, 0, true);
      ctx.lineTo(cx + 5, wy + 18);
      ctx.closePath();
      ctx.fill();
    }
  }
  // 7 spires (3 left + center tallest with Moroni + 3 right)
  const spires = [
    { x: -110, h: 60 },
    { x:  -75, h: 85 },
    { x:  -40, h: 70 },
    { x:    0, h: 130, moroni: true },
    { x:   40, h: 70 },
    { x:   75, h: 85 },
    { x:  110, h: 60 },
  ];
  ctx.fillStyle = '#d4c8b0';
  for (const s of spires) {
    // Tower base block
    ctx.fillRect(s.x - 10, -110, 20, 14);
    ctx.strokeRect(s.x - 10, -110, 20, 14);
    // Mini-crenellations on tower base
    for (let cx = s.x - 9; cx < s.x + 9; cx += 5) {
      ctx.fillRect(cx, -118, 3, 8);
    }
    // Tower body
    ctx.fillRect(s.x - 7, -110 - s.h * 0.55, 14, s.h * 0.55);
    ctx.strokeRect(s.x - 7, -110 - s.h * 0.55, 14, s.h * 0.55);
    // Pointed spire top
    ctx.beginPath();
    ctx.moveTo(s.x - 7, -110 - s.h * 0.55);
    ctx.lineTo(s.x,     -110 - s.h);
    ctx.lineTo(s.x + 7, -110 - s.h * 0.55);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Small decorative pinnacles at each tower's corners
    ctx.fillStyle = '#bdb098';
    ctx.fillRect(s.x - 11, -110 - s.h * 0.55 + 4, 3, s.h * 0.18);
    ctx.fillRect(s.x +  8, -110 - s.h * 0.55 + 4, 3, s.h * 0.18);
    ctx.fillStyle = '#d4c8b0';
    // Moroni on the central tower
    if (s.moroni) {
      ctx.fillStyle = '#e6c14a';
      ctx.beginPath();
      ctx.arc(s.x, -110 - s.h - 4, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s.x, -110 - s.h - 12);
      ctx.lineTo(s.x - 3, -110 - s.h - 4);
      ctx.lineTo(s.x + 3, -110 - s.h - 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#d4c8b0';
    }
  }
  ctx.restore();
}

// Logan Temple: castellated body with two tall corner towers capped by
// pavilion-style cupolas and small spires (the older "fortress" style).
function drawLoganTemple(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#5a4a52';
  ctx.lineWidth = 1.4;
  // Stepped foundation
  ctx.fillStyle = '#a89488';
  ctx.fillRect(-130, -10, 260, 10);
  ctx.strokeRect(-130, -10, 260, 10);
  // Body — warm purple-stone
  ctx.fillStyle = '#a08494';
  ctx.fillRect(-110, -86, 220, 76);
  ctx.strokeRect(-110, -86, 220, 76);
  // Buttress lines (vertical)
  ctx.strokeStyle = 'rgba(70,55,65,0.7)';
  for (let i = -3; i <= 3; i++) {
    const px = i * 32;
    ctx.beginPath();
    ctx.moveTo(px, -86); ctx.lineTo(px, -10);
    ctx.stroke();
  }
  // Body crenellations (between towers)
  ctx.strokeStyle = '#5a4a52';
  ctx.fillStyle = '#a08494';
  for (let i = -54; i < 54; i += 12) {
    ctx.fillRect(i, -94, 7, 8);
    ctx.strokeRect(i, -94, 7, 8);
  }
  // Two corner towers (taller blocks, one slightly taller)
  const towers = [
    { x: -110, w: 56, h: 118, capH: 36 }, // left, taller (east)
    { x:   54, w: 56, h: 100, capH: 32 }, // right (west)
  ];
  for (const t of towers) {
    // Tower body
    ctx.fillStyle = '#a08494';
    ctx.fillRect(t.x, -86 - (t.h - 76), t.w, t.h);
    ctx.strokeRect(t.x, -86 - (t.h - 76), t.w, t.h);
    // Tower crenellations
    const topY = -86 - (t.h - 76);
    for (let cx = t.x; cx < t.x + t.w; cx += 10) {
      ctx.fillRect(cx, topY - 7, 6, 7);
      ctx.strokeRect(cx, topY - 7, 6, 7);
    }
    // Pavilion cupola
    const cupX = t.x + t.w / 2;
    const cupY = topY - 7;
    ctx.fillStyle = '#e8d8c4';
    ctx.beginPath();
    ctx.ellipse(cupX, cupY - t.capH * 0.5, t.w * 0.4, t.capH * 0.55, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Small finial spire on the cupola
    ctx.fillStyle = '#a08494';
    ctx.beginPath();
    ctx.moveTo(cupX - 3, cupY - t.capH);
    ctx.lineTo(cupX,     cupY - t.capH - 14);
    ctx.lineTo(cupX + 3, cupY - t.capH);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Tower windows (arched)
    ctx.fillStyle = 'rgba(60, 50, 70, 0.5)';
    for (let row = 0; row < 2; row++) {
      const wy = -64 + row * 22;
      ctx.beginPath();
      ctx.moveTo(cupX - 6, wy + 14);
      ctx.lineTo(cupX - 6, wy + 4);
      ctx.arc(cupX, wy + 4, 6, Math.PI, 0, true);
      ctx.lineTo(cupX + 6, wy + 14);
      ctx.closePath();
      ctx.fill();
    }
  }
  // Body windows (arched, two rows)
  ctx.fillStyle = 'rgba(60, 50, 70, 0.45)';
  for (let row = 0; row < 2; row++) {
    const wy = -68 + row * 26;
    for (let cx = -88; cx <= 88; cx += 22) {
      ctx.beginPath();
      ctx.moveTo(cx - 5, wy + 14);
      ctx.lineTo(cx - 5, wy + 4);
      ctx.arc(cx, wy + 4, 5, Math.PI, 0, true);
      ctx.lineTo(cx + 5, wy + 14);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();
}
function drawSacredGrove(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Cluster of trees
  const trees = [
    { x: -72, w: 36, h: 80 },
    { x: -28, w: 50, h: 110 },
    { x:  20, w: 44, h: 95 },
    { x:  68, w: 38, h: 80 },
  ];
  for (const t of trees) {
    // Trunk
    ctx.fillStyle = '#5a3818';
    ctx.fillRect(t.x - 5, -32, 10, 32);
    // Foliage layered
    ctx.fillStyle = '#2e6c1f';
    ctx.beginPath();
    ctx.ellipse(t.x, -t.h + 32, t.w * 0.55, t.h * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5dab2d';
    ctx.beginPath();
    ctx.ellipse(t.x - t.w * 0.18, -t.h + 32, t.w * 0.38, t.h * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(180, 230, 130, 0.5)';
    ctx.beginPath();
    ctx.ellipse(t.x - t.w * 0.3, -t.h + 24, t.w * 0.18, t.h * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// Mt. Timpanogos — wide jagged mountain with snowy peaks (LDS-cherished landmark)
function drawMtTimpanogos(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Distant ridge silhouette (back range)
  ctx.fillStyle = '#7282a0';
  ctx.beginPath();
  ctx.moveTo(-200, 0);
  ctx.lineTo(-160, -60);
  ctx.lineTo(-110, -90);
  ctx.lineTo(-50, -130);
  ctx.lineTo(20, -110);
  ctx.lineTo(90, -150);
  ctx.lineTo(170, -100);
  ctx.lineTo(220, -50);
  ctx.lineTo(220, 0);
  ctx.closePath();
  ctx.fill();
  // Foreground mountain — bigger, jagged
  const peaks = [
    { x: -180, y: 0 },
    { x: -150, y: -80 },
    { x: -100, y: -150 },
    { x:  -60, y: -210 },   // first big peak
    { x:  -10, y: -180 },
    { x:   30, y: -240 },   // tallest peak (Timp's iconic profile)
    { x:   80, y: -200 },
    { x:  130, y: -160 },
    { x:  170, y: -100 },
    { x:  200, y: 0 },
  ];
  // Body (rocky purple-grey)
  const body = ctx.createLinearGradient(0, -240, 0, 0);
  body.addColorStop(0, '#8a96b0');
  body.addColorStop(0.55, '#5b6a86');
  body.addColorStop(1, '#3d4a64');
  ctx.fillStyle = body;
  ctx.strokeStyle = '#2a3548';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(peaks[0].x, peaks[0].y);
  for (const p of peaks) ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Snow caps (top portions)
  ctx.fillStyle = '#fdfcf6';
  ctx.beginPath();
  ctx.moveTo(-100, -150);
  ctx.lineTo(-80, -175);
  ctx.lineTo(-65, -195);
  ctx.lineTo(-60, -210);
  ctx.lineTo(-40, -188);
  ctx.lineTo(-25, -195);
  ctx.lineTo(-15, -180);
  ctx.lineTo(-22, -170);
  ctx.lineTo(-50, -160);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -195);
  ctx.lineTo(15, -218);
  ctx.lineTo(30, -240);
  ctx.lineTo(48, -222);
  ctx.lineTo(65, -218);
  ctx.lineTo(78, -206);
  ctx.lineTo(60, -195);
  ctx.lineTo(35, -185);
  ctx.lineTo(15, -180);
  ctx.closePath();
  ctx.fill();
  // Tree line at base
  ctx.fillStyle = '#2f5a22';
  for (let tx = -190; tx <= 190; tx += 18) {
    ctx.beginPath();
    ctx.moveTo(tx - 5, 0);
    ctx.lineTo(tx, -14 - Math.random() * 3);
    ctx.lineTo(tx + 5, 0);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// Pioneer handcart — large wagon wheels, long bed, pioneers pulling from a T-handle.
function drawPioneerHandcarts(ctx, x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Soft prairie shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(10, -2, 130, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // === Cart bed (long wooden box riding above the axle) ===
  // Bed sits high enough that the wheels stick out below it.
  const bedTop = -64, bedBot = -34, bedL = -78, bedR = 22;
  ctx.fillStyle = '#9a6438';
  ctx.strokeStyle = '#2a1505';
  ctx.lineWidth = 1.6;
  ctx.fillRect(bedL, bedTop, bedR - bedL, bedBot - bedTop);
  ctx.strokeRect(bedL, bedTop, bedR - bedL, bedBot - bedTop);
  // Vertical plank lines on the side
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 0.9;
  for (let i = bedL + 10; i < bedR; i += 11) {
    ctx.beginPath(); ctx.moveTo(i, bedTop); ctx.lineTo(i, bedBot); ctx.stroke();
  }
  // Iron corner brackets
  ctx.fillStyle = '#3a3028';
  ctx.fillRect(bedL - 1, bedTop - 1, 6, 5);
  ctx.fillRect(bedR - 5, bedTop - 1, 6, 5);
  ctx.fillRect(bedL - 1, bedBot - 4, 6, 5);
  ctx.fillRect(bedR - 5, bedBot - 4, 6, 5);
  // Canvas-covered load: rounded hump tied with rope
  ctx.fillStyle = '#ece0bc';
  ctx.beginPath();
  ctx.moveTo(bedL + 4, bedTop);
  ctx.quadraticCurveTo((bedL + bedR) / 2, bedTop - 28, bedR - 4, bedTop);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#9a8556';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Lashing rope criss-crossing the canvas
  ctx.strokeStyle = '#7a5a32';
  ctx.lineWidth = 0.9;
  ctx.beginPath();
  for (let lx = bedL + 12; lx < bedR; lx += 14) {
    ctx.moveTo(lx, bedTop);
    ctx.lineTo(lx + 6, bedTop - 18);
    ctx.lineTo(lx + 12, bedTop);
  }
  ctx.stroke();

  // === Wheels — large wagon wheels (two visible, slight perspective offset) ===
  drawHandcartWheel(ctx, -28, -28, 28);   // back wheel
  drawHandcartWheel(ctx,  -2, -32, 32);   // front wheel (slightly larger / lower / closer)
  // Axle hint between hubs
  ctx.strokeStyle = '#3a3028';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-28, -28);
  ctx.lineTo(-2, -32);
  ctx.stroke();

  // === Pulling tongue (long pole forward to T-handle) ===
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(bedR - 4, bedBot - 4);
  ctx.lineTo(96, -38);
  ctx.stroke();
  // Iron clamp where tongue meets bed
  ctx.fillStyle = '#3a3028';
  ctx.fillRect(bedR - 6, bedBot - 8, 6, 8);
  // T-handle cross-bar at the front of the tongue
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(96, -50);
  ctx.lineTo(96, -22);
  ctx.stroke();
  // Handle grips (small bulges at the ends)
  ctx.fillStyle = '#4a2c10';
  ctx.beginPath(); ctx.arc(96, -52, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(96, -20, 3.5, 0, Math.PI * 2); ctx.fill();

  // === Pioneer figures pulling from the T-handle ===
  // Father (taller, in front)
  drawPioneerFigure(ctx, 122, 0, 30, '#3a2410', '#3a2410', false);
  // Mother (long dress + bonnet)
  drawPioneerFigure(ctx, 108, 0, 28, '#5a3a26', '#e8d8b0', true);
  // Child (smaller)
  drawPioneerFigure(ctx, 138, 0, 20, '#4a3024', '#4a3024', false);

  ctx.restore();
}

function drawHandcartWheel(ctx, cx, cy, r) {
  // Wood rim
  ctx.fillStyle = '#7a4a20';
  ctx.strokeStyle = '#2a1505';
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Inner gap (sky/background showing through)
  ctx.fillStyle = 'rgba(180, 200, 220, 0.4)';
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.78, 0, Math.PI * 2); ctx.fill();
  // Spokes (8 wooden spokes)
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 2.6;
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r * 0.18), cy + Math.sin(a) * (r * 0.18));
    ctx.lineTo(cx + Math.cos(a) * (r * 0.82), cy + Math.sin(a) * (r * 0.82));
    ctx.stroke();
  }
  // Hub
  ctx.fillStyle = '#3a2410';
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1a0a00';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // Iron rim (dark band around outside)
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.arc(cx, cy, r - 1, 0, Math.PI * 2); ctx.stroke();
}

function drawPioneerFigure(ctx, x, footY, height, bodyColor, headwearColor, bonnet) {
  const headR = Math.max(4, height * 0.18);
  const headY = footY - height + headR;
  // Body — tapered (narrower at shoulders, wider at hem for dress)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  if (bonnet) {
    // Long dress shape
    ctx.moveTo(x - 5, headY + headR);
    ctx.lineTo(x - 9, footY - 2);
    ctx.lineTo(x + 9, footY - 2);
    ctx.lineTo(x + 5, headY + headR);
  } else {
    // Trousers and shirt
    ctx.moveTo(x - 5, headY + headR);
    ctx.lineTo(x - 6, footY - 14);
    ctx.lineTo(x + 6, footY - 14);
    ctx.lineTo(x + 5, headY + headR);
  }
  ctx.closePath();
  ctx.fill();
  // Trousers/legs (only visible if not in dress)
  if (!bonnet) {
    ctx.strokeStyle = bodyColor;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 3, footY - 14);
    ctx.lineTo(x - 4, footY - 1);
    ctx.moveTo(x + 3, footY - 14);
    ctx.lineTo(x + 5, footY - 1);
    ctx.stroke();
  }
  // Head (skin-tone)
  ctx.fillStyle = '#e6c8a0';
  ctx.beginPath(); ctx.arc(x, headY, headR, 0, Math.PI * 2); ctx.fill();
  // Hat or bonnet
  ctx.fillStyle = headwearColor;
  if (bonnet) {
    // Bonnet — covers most of head with brim sticking forward
    ctx.beginPath();
    ctx.ellipse(x - 1, headY - 1, headR + 1, headR * 0.95, 0, Math.PI * 0.95, Math.PI * 2.05);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 2, headY, headR * 1.4, headR * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Wide-brim hat
    ctx.beginPath();
    ctx.ellipse(x, headY - headR * 0.5, headR * 1.2, headR * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x, headY - headR * 0.7, headR * 0.7, headR * 0.5, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  }
  // Arms reaching back/down to the T-handle (which is to the left)
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = Math.max(2.5, height * 0.1);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - 4, headY + headR + 4);
  ctx.lineTo(x - 18, headY + headR + 12);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 4, headY + headR + 4);
  ctx.lineTo(x - 14, headY + headR + 16);
  ctx.stroke();
}

// The Mayflower — small Pilgrim ship with billowing sails
function drawMayflower(ctx, x, y, t = 0) {
  ctx.save();
  ctx.translate(x, y);
  // Scale the entire ship + cyclops up so it's a proper landmark
  ctx.scale(2.8, 2.8);
  // Hull (curved wooden body)
  const hull = ctx.createLinearGradient(0, -10, 0, 30);
  hull.addColorStop(0, '#8a5a2a');
  hull.addColorStop(1, '#3a1f0a');
  ctx.fillStyle = hull;
  ctx.strokeStyle = '#2a1505';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(-95, -8);
  ctx.lineTo(80, -8);
  ctx.quadraticCurveTo(108, 8, 70, 28);
  ctx.lineTo(-78, 28);
  ctx.quadraticCurveTo(-118, 12, -95, -8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Stripes/planks on hull
  ctx.strokeStyle = 'rgba(40, 20, 5, 0.45)';
  ctx.lineWidth = 0.8;
  for (let py = -2; py < 26; py += 6) {
    ctx.beginPath();
    ctx.moveTo(-92 + py * 0.2, py);
    ctx.lineTo(78 - py * 0.1, py);
    ctx.stroke();
  }
  // Aft castle (raised stern at rear/left)
  ctx.fillStyle = '#7a4a20';
  ctx.fillRect(-100, -32, 32, 28);
  ctx.strokeStyle = '#2a1505';
  ctx.strokeRect(-100, -32, 32, 28);
  // Tiny stern windows
  ctx.fillStyle = '#f0e0a0';
  ctx.fillRect(-96, -26, 5, 7);
  ctx.fillRect(-88, -26, 5, 7);
  ctx.fillRect(-80, -26, 5, 7);
  // Forecastle (raised bow, small)
  ctx.fillStyle = '#7a4a20';
  ctx.fillRect(58, -22, 22, 18);
  ctx.strokeRect(58, -22, 22, 18);
  // === Three masts with sails ===
  const sway = Math.sin(t * 1.3) * 2;
  ctx.strokeStyle = '#3a2410';
  ctx.lineWidth = 2.5;
  // Masts
  for (const mx of [-50, 0, 50]) {
    ctx.beginPath();
    ctx.moveTo(mx, -8);
    ctx.lineTo(mx + sway * 0.5, -110);
    ctx.stroke();
  }
  // Sails (white, billowing)
  ctx.fillStyle = '#fdfcf2';
  ctx.strokeStyle = '#a89878';
  ctx.lineWidth = 1;
  // Main mast (center, biggest)
  ctx.beginPath();
  ctx.moveTo(-32, -32);
  ctx.quadraticCurveTo(0 + sway, -22, 32, -32);
  ctx.lineTo(34, -82);
  ctx.quadraticCurveTo(0 + sway * 0.7, -72, -34, -82);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Top sail center
  ctx.beginPath();
  ctx.moveTo(-22, -86);
  ctx.quadraticCurveTo(0 + sway * 0.5, -78, 22, -86);
  ctx.lineTo(20, -108);
  ctx.lineTo(-20, -108);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Fore mast (right)
  ctx.beginPath();
  ctx.moveTo(28, -22);
  ctx.quadraticCurveTo(50 + sway * 0.6, -14, 70, -22);
  ctx.lineTo(70, -68);
  ctx.quadraticCurveTo(50 + sway * 0.5, -58, 30, -68);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Mizzen (left/aft)
  ctx.beginPath();
  ctx.moveTo(-72, -32);
  ctx.quadraticCurveTo(-50 + sway * 0.4, -24, -28, -32);
  ctx.lineTo(-28, -72);
  ctx.quadraticCurveTo(-50 + sway * 0.3, -62, -72, -72);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Flag on top of main mast
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.moveTo(0 + sway, -110);
  ctx.lineTo(20 + sway, -114);
  ctx.lineTo(0 + sway, -118);
  ctx.closePath();
  ctx.fill();

  // ===== Cyclops on deck =====
  // Always visible. No eye until the launched eyeball lands on the ship.
  const cx = -10;       // x position (between mizzen and main mast, on deck)
  const cdy = -10;      // base y at the deck
  const hasEye = treb.sailing;
  // Pants
  ctx.fillStyle = '#3a2410';
  ctx.strokeStyle = '#1a0d05';
  ctx.lineWidth = 1;
  ctx.fillRect(cx - 9, cdy + 8, 18, 8);
  ctx.strokeRect(cx - 9, cdy + 8, 18, 8);
  // Body — sailor stripes
  ctx.fillStyle = '#fdfcf2';
  ctx.fillRect(cx - 9, cdy - 6, 18, 14);
  ctx.strokeRect(cx - 9, cdy - 6, 18, 14);
  ctx.fillStyle = '#3a5e8a';
  ctx.fillRect(cx - 9, cdy - 3, 18, 2);
  ctx.fillRect(cx - 9, cdy + 1, 18, 2);
  ctx.fillRect(cx - 9, cdy + 5, 18, 2);
  // Arms
  ctx.fillStyle = '#fdfcf2';
  ctx.fillRect(cx - 13, cdy - 5, 4, 10);
  ctx.strokeRect(cx - 13, cdy - 5, 4, 10);
  ctx.fillRect(cx + 9, cdy - 5, 4, 10);
  ctx.strokeRect(cx + 9, cdy - 5, 4, 10);
  // Hands
  ctx.fillStyle = '#e8c8a0';
  ctx.beginPath(); ctx.arc(cx - 11, cdy + 6, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + 11, cdy + 6, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Head
  ctx.fillStyle = '#e8c8a0';
  ctx.beginPath(); ctx.arc(cx, cdy - 17, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Bandana
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.moveTo(cx - 11, cdy - 19);
  ctx.quadraticCurveTo(cx, cdy - 28, cx + 11, cdy - 19);
  ctx.lineTo(cx + 11, cdy - 16);
  ctx.quadraticCurveTo(cx, cdy - 18, cx - 11, cdy - 16);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#7a1a1a';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // Bandana tail off the right side
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.moveTo(cx + 11, cdy - 18);
  ctx.lineTo(cx + 19, cdy - 12);
  ctx.lineTo(cx + 14, cdy - 10);
  ctx.lineTo(cx + 11, cdy - 16);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Eye socket (always shown)
  ctx.fillStyle = '#5a3a1a';
  ctx.strokeStyle = '#1a0d05';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cdy - 17, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  if (hasEye) {
    // Render whatever projectile was used as the cyclops's eye —
    // tennis ball eye, watermelon eye, popcorn eye, etc.
    ctx.save();
    ctx.translate(cx, cdy - 17);
    drawBall(ctx, 4.2, '#4d96ff', '#4d96ff', state.trebProjectile || 'eyeball', 0, 0, 7, 0);
    ctx.restore();
  } else {
    // X stitch where the eye would be (lost-eye look)
    ctx.strokeStyle = '#3a1f0a';
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 3, cdy - 19); ctx.lineTo(cx + 3, cdy - 15);
    ctx.moveTo(cx + 3, cdy - 19); ctx.lineTo(cx - 3, cdy - 15);
    ctx.stroke();
  }
  // Mouth — smile when he has his eye, frown when missing
  ctx.strokeStyle = '#3a1f0a';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (hasEye) {
    ctx.arc(cx, cdy - 11, 3.2, 0.25, Math.PI - 0.25);
  } else {
    ctx.arc(cx, cdy - 7, 3.2, Math.PI + 0.25, Math.PI * 2 - 0.25);
  }
  ctx.stroke();
  // Speech bubble: "Ahoy!" when sailing
  if (hasEye) {
    const sbX = cx + 28;
    const sbY = cdy - 32;
    ctx.fillStyle = '#fdfcf2';
    ctx.strokeStyle = '#3a1f0a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(sbX, sbY, 24, 13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Tail to cyclops
    ctx.beginPath();
    ctx.moveTo(sbX - 18, sbY + 7);
    ctx.lineTo(sbX - 26, sbY + 16);
    ctx.lineTo(sbX - 12, sbY + 10);
    ctx.closePath();
    ctx.fillStyle = '#fdfcf2';
    ctx.fill();
    ctx.stroke();
    // Hide the seam where tail meets bubble
    ctx.strokeStyle = '#fdfcf2';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sbX - 18, sbY + 7);
    ctx.lineTo(sbX - 12, sbY + 10);
    ctx.stroke();
    // Text
    ctx.fillStyle = '#3a1f0a';
    ctx.font = '700 13px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Ahoy!', sbX, sbY);
  }

  ctx.restore();
}

function trebDraw(ctx, dt) {
  const g = trebGeom();
  const inFlight = treb.phase === 'flying' || treb.phase === 'landed';

  // ===== Ground band — grass left of shoreline, ocean past it =====
  // Compute the shoreline screen X based on current camera (treb.fx).
  const shorelineScreenX = inFlight
    ? trebWorldToScreenX(OCEAN_START_FT)
    : W + 1000; // pre-flight: shoreline is way off-screen → all grass
  const grassEndX = Math.max(0, Math.min(W, shorelineScreenX));
  // --- Grass portion ---
  if (grassEndX > 0) {
    const grassGrad = ctx.createLinearGradient(0, g.groundY, 0, H);
    grassGrad.addColorStop(0, '#7ab83a');
    grassGrad.addColorStop(1, '#3a6618');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, g.groundY, grassEndX, H - g.groundY);
    // grass blade flecks
    ctx.fillStyle = 'rgba(150, 200, 90, 0.5)';
    for (let i = 0; i < 60; i++) {
      const x = (i * 137.5 + (inFlight ? -treb.fx * TREB.PX_PER_FT * 0.5 : 0)) % W;
      const xx = (x + W) % W;
      if (xx < grassEndX) ctx.fillRect(xx, g.groundY + (i % 7) * 4, 2, 5);
    }
  }
  // --- Ocean portion (right of shoreline) ---
  if (grassEndX < W) {
    const oceanGrad = ctx.createLinearGradient(0, g.groundY, 0, H);
    oceanGrad.addColorStop(0, '#4ea0c8');
    oceanGrad.addColorStop(0.6, '#28608c');
    oceanGrad.addColorStop(1, '#143850');
    ctx.fillStyle = oceanGrad;
    ctx.fillRect(grassEndX, g.groundY, W - grassEndX, H - g.groundY);
    // Animated wave lines
    const t = (performance.now() / 1000);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)';
    ctx.lineWidth = 1.4;
    for (let row = 0; row < 8; row++) {
      const wy = g.groundY + 12 + row * 14;
      ctx.beginPath();
      for (let wx = grassEndX; wx <= W; wx += 8) {
        const phase = (wx - treb.fx * TREB.PX_PER_FT) * 0.012 + t * (1.4 + row * 0.15);
        const dy = Math.sin(phase) * (1.6 + row * 0.18);
        if (wx === grassEndX) ctx.moveTo(wx, wy + dy);
        else ctx.lineTo(wx, wy + dy);
      }
      ctx.stroke();
    }
    // Sandy beach strip at the shoreline
    if (grassEndX > 0 && grassEndX < W) {
      const beachW = 30;
      const sandGrad = ctx.createLinearGradient(grassEndX - beachW, 0, grassEndX + beachW, 0);
      sandGrad.addColorStop(0, 'rgba(218, 196, 142, 0)');
      sandGrad.addColorStop(0.5, 'rgba(232, 210, 156, 0.85)');
      sandGrad.addColorStop(1, 'rgba(218, 196, 142, 0)');
      ctx.fillStyle = sandGrad;
      ctx.fillRect(grassEndX - beachW, g.groundY, beachW * 2, 14);
    }
  }

  if (inFlight) {
    trebDrawFlight(ctx, g);
  } else if (treb.phase === 'broken') {
    trebDrawBroken(ctx, g);
  } else {
    trebDrawTrebuchet(ctx, g);
  }

  // Update + draw splats (eyeball pieces from the latest landing).
  // We call this here because the main loop's splat handler is skipped
  // while trebuchet mode owns the screen.
  for (let i = splats.length - 1; i >= 0; i--) {
    splats[i].update(dt, PLANETS[state.planet]);
    splats[i].draw(ctx);
    if (splats[i].done) splats.splice(i, 1);
  }

  // ===== HUD =====
  trebDrawHUD(ctx, g);
}

// === Broken trebuchet — easter egg when charge >= 249% ===
// Pieces are spawned at the moment of the snap and fall under gravity.
function initBrokenPieces() {
  const g = trebGeom();
  const theta = trebArmAngle(1, 0); // fully cocked arm angle
  const cosT = Math.cos(theta), sinT = Math.sin(theta);
  // Long-arm break point (~55% out from pivot toward sling tip)
  const breakRatio = 0.55;
  const longBreakX = g.pivotX + cosT * g.longLen * breakRatio;
  const longBreakY = g.pivotY - sinT * g.longLen * breakRatio;
  const longTipX = g.pivotX + cosT * g.longLen;
  const longTipY = g.pivotY - sinT * g.longLen;
  // Short-arm tip (where the drum hangs)
  const shortTipX = g.pivotX - cosT * g.shortLen;
  const shortTipY = g.pivotY + sinT * g.shortLen;
  // Drum hangs ~46 below the short-arm tip
  const drumX = shortTipX;
  const drumY = shortTipY + 46;
  treb.pieces = [
    // The free long-arm half with sling — flies off, tumbles
    {
      type: 'longHalf',
      cx: (longBreakX + longTipX) / 2,
      cy: (longBreakY + longTipY) / 2,
      vx: -120 + Math.random() * 40,           // pushed away from pivot (toward back-left)
      vy: -180 - Math.random() * 60,           // popped upward by the snap
      rot: theta,
      rotVel: -3 - Math.random() * 2,
      length: g.longLen * (1 - breakRatio),
      atRest: false,
      onRest: 'horizontal',
    },
    // Short-arm + drum still attached. Stays anchored to the pivot but swings
    // freely under the heavy drum's weight (damped pendulum).
    {
      type: 'pivotPiece',
      theta: theta,                           // current arm angle
      thetaVel: 0,                            // angular velocity
      stubLen: g.longLen * 0.35,              // small splintered stub on the long side
      shortLen: g.shortLen,
      drumHang: 46,
      atRest: false,
    },
    // The eyeball, popped out of the sling
    {
      type: 'eyeball',
      cx: longTipX + 10,
      cy: g.groundY - 36,
      vx: 60 + Math.random() * 60,
      vy: -260 - Math.random() * 60,
      rot: 0,
      rotVel: 6 + Math.random() * 4,
      atRest: false,
      onRest: 'tipped',
    },
    // A few concrete chunks blown out of the drum
    ...Array.from({ length: 4 }, () => ({
      type: 'concrete',
      cx: drumX + (Math.random() - 0.5) * 20,
      cy: drumY - 20,
      vx: (Math.random() - 0.5) * 500,
      vy: -300 - Math.random() * 200,
      rot: Math.random() * Math.PI * 2,
      rotVel: (Math.random() - 0.5) * 14,
      size: 6 + Math.random() * 6,
      atRest: false,
    })),
    // A small splintered wood shard or two flying off the snap
    ...Array.from({ length: 3 }, () => ({
      type: 'shard',
      cx: longBreakX + (Math.random() - 0.5) * 12,
      cy: longBreakY + (Math.random() - 0.5) * 12,
      vx: (Math.random() - 0.5) * 350,
      vy: -180 - Math.random() * 200,
      rot: Math.random() * Math.PI * 2,
      rotVel: (Math.random() - 0.5) * 16,
      length: 14 + Math.random() * 16,
      atRest: false,
    })),
  ];
}

function updateBrokenPieces(dt) {
  const g = trebGeom();
  const groundY = g.groundY - 6;
  const GRAV = 1100;     // px/s²
  const DRAG = 0.992;    // air drag per frame at 60fps
  for (const p of treb.pieces) {
    if (p.atRest) continue;
    if (p.type === 'pivotPiece') {
      // Damped pendulum settling at theta = π/2 (long arm vertical → drum at bottom)
      const target = Math.PI / 2;
      let diff = p.theta - target;
      while (diff > Math.PI)  diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      // Restoring + damping
      p.thetaVel += -16 * Math.sin(diff) * dt;
      p.thetaVel *= Math.pow(0.965, dt * 60);
      p.theta += p.thetaVel * dt;
      // Settled when motion is tiny
      if (Math.abs(diff) < 0.04 && Math.abs(p.thetaVel) < 0.05) {
        p.theta = target;
        p.thetaVel = 0;
        p.atRest = true;
      }
      continue;
    }
    // Free-fall pieces
    p.vy += GRAV * dt;
    p.vx *= Math.pow(DRAG, dt * 60);
    p.cx += p.vx * dt;
    p.cy += p.vy * dt;
    p.rot += p.rotVel * dt;
    if (p.cy >= groundY) {
      p.cy = groundY;
      // Bounce
      if (Math.abs(p.vy) > 60) {
        p.vy = -p.vy * 0.32;
        p.vx *= 0.55;
        p.rotVel *= 0.5;
      } else {
        p.vy = 0;
        p.vx *= 0.6;
        p.rotVel *= 0.7;
        if (Math.abs(p.vx) < 8 && Math.abs(p.rotVel) < 0.4) {
          p.vx = 0;
          p.rotVel = 0;
          p.atRest = true;
          // Snap rotation to a natural resting angle
          if (p.onRest === 'horizontal') {
            // Round to nearest π so the beam lies flat
            p.rot = Math.round(p.rot / Math.PI) * Math.PI;
          } else if (p.onRest === 'tipped') {
            // Eyeball lying on its side
            p.rot = Math.PI / 2;
          }
        }
      }
    }
  }
}

function trebDrawBroken(ctx, g) {
  const baseY = g.groundY;
  const elapsed = (performance.now() - treb.brokenAt) / 1000;

  // === The A-frame is left standing (load suddenly gone) — render normally ===
  // Sled
  ctx.fillStyle = '#7a4f1d';
  ctx.fillRect(g.pivotX - g.baseHalf - 20, baseY - 6, g.baseHalf * 2 + 40, 8);
  // Triangle leg pairs — same draw as the working trebuchet but no arm/drum
  const drawLegPair = (offsetX) => {
    ctx.strokeStyle = '#7a4f1d';
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(g.pivotX - g.baseHalf + offsetX, baseY);
    ctx.lineTo(g.pivotX + offsetX, g.pivotY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(g.pivotX + g.baseHalf + offsetX, baseY);
    ctx.lineTo(g.pivotX + offsetX, g.pivotY);
    ctx.stroke();
    ctx.lineWidth = 5;
    for (let i = 1; i <= 2; i++) {
      const t = i / 3;
      const lx = g.pivotX - g.baseHalf + (g.baseHalf) * t + offsetX;
      const rx = g.pivotX + g.baseHalf - (g.baseHalf) * t + offsetX;
      const ly = baseY - (baseY - g.pivotY) * t;
      ctx.beginPath();
      ctx.moveTo(lx, ly); ctx.lineTo(rx, ly); ctx.stroke();
    }
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(g.pivotX - g.baseHalf * 0.7 + offsetX, baseY - (baseY - g.pivotY) * 0.25);
    ctx.lineTo(g.pivotX + g.baseHalf * 0.7 + offsetX, baseY - (baseY - g.pivotY) * 0.75);
    ctx.stroke();
  };
  drawLegPair(-12);
  drawLegPair(12);
  // Pivot peg
  ctx.fillStyle = '#bbb';
  ctx.beginPath();
  ctx.arc(g.pivotX, g.pivotY, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // === Dust cloud right at the snap point (expands & fades, peaks ~0.5s) ===
  const dustAlpha = Math.max(0, 0.55 - elapsed * 0.5);
  const dustR = 50 + elapsed * 220;
  if (dustAlpha > 0.02) {
    const dust = ctx.createRadialGradient(g.pivotX, g.pivotY, 4, g.pivotX, g.pivotY, dustR);
    dust.addColorStop(0, `rgba(200, 180, 150, ${dustAlpha})`);
    dust.addColorStop(1, 'rgba(200, 180, 150, 0)');
    ctx.fillStyle = dust;
    ctx.fillRect(g.pivotX - dustR - 20, g.pivotY - dustR - 20, (dustR + 20) * 2, (dustR + 20) * 2);
  }

  // === Animated pieces ===
  for (const p of treb.pieces) {
    if (p.type === 'pivotPiece') {
      drawPivotPiece(ctx, g, p);
    } else if (p.type === 'longHalf') {
      drawLongHalfPiece(ctx, p);
    } else if (p.type === 'eyeball') {
      ctx.save();
      ctx.translate(p.cx, p.cy);
      ctx.rotate(p.rot);
      drawBall(ctx, 32, '#4d96ff', '#4d96ff', state.trebProjectile, Math.PI / 2, 0, 7, 0);
      ctx.restore();
    } else if (p.type === 'concrete') {
      ctx.save();
      ctx.translate(p.cx, p.cy);
      ctx.rotate(p.rot);
      ctx.fillStyle = '#a8a39a';
      ctx.strokeStyle = '#3a3530';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-p.size, -p.size * 0.6);
      ctx.lineTo(p.size * 0.7, -p.size);
      ctx.lineTo(p.size, p.size * 0.4);
      ctx.lineTo(p.size * 0.2, p.size);
      ctx.lineTo(-p.size * 0.8, p.size * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // pebble fleck
      ctx.fillStyle = 'rgba(40, 38, 35, 0.7)';
      ctx.beginPath();
      ctx.arc(0, 0, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (p.type === 'shard') {
      ctx.save();
      ctx.translate(p.cx, p.cy);
      ctx.rotate(p.rot);
      ctx.strokeStyle = '#d8c598';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-p.length / 2, 0);
      ctx.lineTo(p.length / 2, 0);
      ctx.stroke();
      ctx.strokeStyle = '#7a5a32';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-p.length / 2, 0);
      ctx.lineTo(p.length / 2, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  // === HUD message — fades in after the snap so the action reads first ===
  const msgAlpha = Math.min(1, Math.max(0, (elapsed - 0.7) * 1.6));
  if (msgAlpha > 0.02) {
    ctx.save();
    ctx.globalAlpha = msgAlpha;
    ctx.font = '900 78px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(20,14,6,0.55)';
    roundRect(ctx, W / 2 - 380, H / 2 - 110, 760, 170, 22); ctx.fill();
    ctx.fillStyle = '#ff7a5a';
    ctx.fillText('IT BROKE!', W / 2, H / 2 - 36);
    ctx.font = '700 24px system-ui';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('You sang too loud — the trebuchet snapped clean in half.', W / 2, H / 2 + 18);
    ctx.font = '600 18px system-ui';
    ctx.fillStyle = '#d8d4c0';
    ctx.fillText('Maybe save some lung capacity for next time.', W / 2, H / 2 + 48);
    ctx.restore();
  }
}

// === Helpers for animated wreckage pieces ===

// The free long-arm half (with sling rope ends) tumbling through the air.
function drawLongHalfPiece(ctx, p) {
  ctx.save();
  ctx.translate(p.cx, p.cy);
  ctx.rotate(p.rot);
  // Beam
  ctx.strokeStyle = '#d8c598';
  ctx.lineWidth = 11;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-p.length / 2, 0);
  ctx.lineTo(p.length / 2, 0);
  ctx.stroke();
  ctx.strokeStyle = '#8a6a3e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-p.length / 2, 0);
  ctx.lineTo(p.length / 2, 0);
  ctx.stroke();
  // Splintered end at the break (left)
  ctx.fillStyle = '#a8895a';
  ctx.beginPath();
  ctx.moveTo(-p.length / 2, -6);
  ctx.lineTo(-p.length / 2 - 10, -2);
  ctx.lineTo(-p.length / 2 - 3, 1);
  ctx.lineTo(-p.length / 2 - 12, 4);
  ctx.lineTo(-p.length / 2 - 2, 6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Sling rope ends dangling from the tip (right)
  ctx.strokeStyle = '#cc4444';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(p.length / 2 - 4, 0);
  ctx.lineTo(p.length / 2 + 8, 18);
  ctx.moveTo(p.length / 2 - 2, 0);
  ctx.lineTo(p.length / 2 + 14, 22);
  ctx.stroke();
  ctx.restore();
}

// The pivot piece — short arm + drum still attached, swinging on the pivot peg.
function drawPivotPiece(ctx, g, p) {
  const cosT = Math.cos(p.theta), sinT = Math.sin(p.theta);
  const stubX = g.pivotX + cosT * p.stubLen;
  const stubY = g.pivotY - sinT * p.stubLen;
  const shortX = g.pivotX - cosT * p.shortLen;
  const shortY = g.pivotY + sinT * p.shortLen;

  // Beam from stub end through pivot to short tip
  ctx.strokeStyle = '#d8c598';
  ctx.lineWidth = 11;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(stubX, stubY);
  ctx.lineTo(shortX, shortY);
  ctx.stroke();
  ctx.strokeStyle = '#8a6a3e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(stubX, stubY);
  ctx.lineTo(shortX, shortY);
  ctx.stroke();

  // Splintered end on the long-side stub
  ctx.save();
  ctx.translate(stubX, stubY);
  ctx.rotate(p.theta);
  ctx.fillStyle = '#a8895a';
  ctx.beginPath();
  ctx.moveTo(0, -6);
  ctx.lineTo(10, -2);
  ctx.lineTo(3, 1);
  ctx.lineTo(12, 4);
  ctx.lineTo(2, 6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#5a3818';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // Chain from short-arm tip to drum (drum hangs straight down due to gravity)
  const drumCx = shortX;
  const drumCy = shortY + p.drumHang;
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(shortX, shortY);
  ctx.lineTo(drumCx, drumCy);
  ctx.stroke();

  // Steel drum (compact version of the cocked-state drum)
  drawSteelDrumAt(ctx, drumCx, drumCy);
}

// Compact steel drum render used by the pivot piece.
function drawSteelDrumAt(ctx, cx, cy) {
  const bw = 34, bh = 60;
  const top = cy - 14, bot = top + bh;
  const bodyGrad = ctx.createLinearGradient(cx - bw, 0, cx + bw, 0);
  bodyGrad.addColorStop(0, '#1f1f22');
  bodyGrad.addColorStop(0.45, '#5a5a5e');
  bodyGrad.addColorStop(0.55, '#6d6d72');
  bodyGrad.addColorStop(1, '#15151a');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#0e0e12';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(cx - bw, top);
  ctx.lineTo(cx - bw, bot - 2);
  ctx.quadraticCurveTo(cx, bot + 4, cx + bw, bot - 2);
  ctx.lineTo(cx + bw, top);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Hoops
  ctx.strokeStyle = '#0a0a0e';
  ctx.lineWidth = 4.5;
  for (const ratio of [0.08, 0.18, 0.78, 0.92]) {
    const hy = top + (bot - top) * ratio;
    ctx.beginPath();
    ctx.moveTo(cx - bw, hy);
    ctx.lineTo(cx + bw, hy);
    ctx.stroke();
  }
  // Concrete top
  const concGrad = ctx.createLinearGradient(cx - bw, top, cx + bw, top);
  concGrad.addColorStop(0, '#5a5550');
  concGrad.addColorStop(0.5, '#a8a39a');
  concGrad.addColorStop(1, '#403a35');
  ctx.fillStyle = concGrad;
  ctx.beginPath();
  ctx.ellipse(cx, top, bw - 2, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2a2520';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

// Compute current barrel center in screen coords (matches the math in trebDrawTrebuchet)
function trebBarrelPos() {
  const g = trebGeom();
  const cock = Math.min(1, treb.charge);
  const releaseT = treb.phase === 'releasing' ? treb.releaseT : 0;
  const baseCock = treb.phase === 'releasing' ? 1 : cock;
  const theta = trebArmAngle(baseCock, releaseT);
  const shortX = g.pivotX - Math.cos(theta) * g.shortLen;
  const shortY = g.pivotY + Math.sin(theta) * g.shortLen;
  return { x: shortX, y: shortY + 38 }; // 38 = cwHangLen (matches barrel anchor)
}

// A small black crow — perched (folded wings) or flying (flapping)
function drawCrow(ctx, b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.scale(b.scale, b.scale);
  const flap = Math.sin(b.flapPhase);
  const wingFlap = b.perched ? 0 : flap * 6;
  // Tail
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.moveTo(-7, -1);
  ctx.lineTo(-15, -3);
  ctx.lineTo(-15, 3);
  ctx.lineTo(-7, 1);
  ctx.closePath();
  ctx.fill();
  // Body
  ctx.beginPath();
  ctx.ellipse(-1, 0, 9, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(7, -3, 4.5, 0, Math.PI * 2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#d8a040';
  ctx.beginPath();
  ctx.moveTo(11, -3);
  ctx.lineTo(15.5, -1.5);
  ctx.lineTo(11, -0.5);
  ctx.closePath();
  ctx.fill();
  // Wings
  ctx.fillStyle = b.color;
  if (b.perched) {
    // Folded wing along body
    ctx.beginPath();
    ctx.ellipse(-2, -1, 7.5, 3.2, -0.18, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Two wings flapping
    ctx.beginPath();
    ctx.moveTo(-1, 0);
    ctx.lineTo(-9, -10 + wingFlap);
    ctx.lineTo(3, -2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-1, 0);
    ctx.lineTo(-9, 10 - wingFlap);
    ctx.lineTo(3, 2);
    ctx.closePath();
    ctx.fill();
  }
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8.2, -4, 1, 0, Math.PI * 2);
  ctx.fill();
  // Legs (only when perched)
  if (b.perched) {
    ctx.strokeStyle = '#d8a040';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-1, 5); ctx.lineTo(-1, 10);
    ctx.moveTo(2, 5); ctx.lineTo(2, 10);
    ctx.stroke();
  }
  ctx.restore();
}

function trebDrawTrebuchet(ctx, g) {
  // Wooden A-frame base — heavy cross legs + horizontal beams + base sled
  const baseY = g.groundY;
  ctx.strokeStyle = '#7a4f1d';
  ctx.fillStyle   = '#a87034';
  ctx.lineCap     = 'round';
  // Sled — heavier, with a darker top edge for depth
  ctx.fillStyle = '#5e3a14';
  ctx.fillRect(g.pivotX - g.baseHalf - 26, baseY - 4, g.baseHalf * 2 + 52, 14);
  ctx.fillStyle = '#7a4f1d';
  ctx.fillRect(g.pivotX - g.baseHalf - 26, baseY - 4, g.baseHalf * 2 + 52, 5);
  // Front and back triangle leg pairs (foreshortened)
  const drawLegPair = (offsetX) => {
    // Outer dark stroke = beam outline
    ctx.strokeStyle = '#3a1f08';
    ctx.lineWidth = 18;
    ctx.beginPath();
    ctx.moveTo(g.pivotX - g.baseHalf + offsetX, baseY);
    ctx.lineTo(g.pivotX + offsetX, g.pivotY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(g.pivotX + g.baseHalf + offsetX, baseY);
    ctx.lineTo(g.pivotX + offsetX, g.pivotY);
    ctx.stroke();
    // Inner lighter stroke = wood face
    ctx.strokeStyle = '#8a5a25';
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(g.pivotX - g.baseHalf + offsetX, baseY);
    ctx.lineTo(g.pivotX + offsetX, g.pivotY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(g.pivotX + g.baseHalf + offsetX, baseY);
    ctx.lineTo(g.pivotX + offsetX, g.pivotY);
    ctx.stroke();
    // Cross-beams (two horizontals up the legs) — beefier
    ctx.strokeStyle = '#3a1f08';
    ctx.lineWidth = 12;
    for (let i = 1; i <= 2; i++) {
      const t = i / 3;
      const lx = g.pivotX - g.baseHalf + (g.baseHalf) * t + offsetX;
      const rx = g.pivotX + g.baseHalf - (g.baseHalf) * t + offsetX;
      const y  = baseY - (baseY - g.pivotY) * t;
      ctx.beginPath();
      ctx.moveTo(lx, y); ctx.lineTo(rx, y); ctx.stroke();
    }
    ctx.strokeStyle = '#8a5a25';
    ctx.lineWidth = 8;
    for (let i = 1; i <= 2; i++) {
      const t = i / 3;
      const lx = g.pivotX - g.baseHalf + (g.baseHalf) * t + offsetX;
      const rx = g.pivotX + g.baseHalf - (g.baseHalf) * t + offsetX;
      const y  = baseY - (baseY - g.pivotY) * t;
      ctx.beginPath();
      ctx.moveTo(lx, y); ctx.lineTo(rx, y); ctx.stroke();
    }
    // Diagonal cross-brace
    ctx.strokeStyle = '#5e3a14';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(g.pivotX - g.baseHalf * 0.7 + offsetX, baseY - (baseY - g.pivotY) * 0.25);
    ctx.lineTo(g.pivotX + g.baseHalf * 0.7 + offsetX, baseY - (baseY - g.pivotY) * 0.75);
    ctx.stroke();
  };
  drawLegPair(-14); // back legs (slightly behind)
  drawLegPair(14);  // front legs

  // Pivot peg
  ctx.fillStyle = '#bbb';
  ctx.beginPath();
  ctx.arc(g.pivotX, g.pivotY, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ===== Arm =====
  // 100% charge → fully cocked. Overcharge doesn't crank further visually,
  // it just adds launch velocity.
  const cock = Math.min(1, treb.charge);
  const releaseT = treb.phase === 'releasing' ? treb.releaseT : 0;
  const baseCock = treb.phase === 'releasing' ? 1 : cock;
  const theta = trebArmAngle(baseCock, releaseT);

  // Arm endpoints (long end forward at +theta, short end opposite)
  const longX  = g.pivotX + Math.cos(theta) * g.longLen;
  const longY  = g.pivotY - Math.sin(theta) * g.longLen;       // canvas y inverted
  const shortX = g.pivotX - Math.cos(theta) * g.shortLen;
  const shortY = g.pivotY + Math.sin(theta) * g.shortLen;

  // Arm beam (tapered look — drawn as two strokes)
  ctx.strokeStyle = '#d8c598';
  ctx.lineWidth = 11;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(shortX, shortY);
  ctx.lineTo(longX, longY);
  ctx.stroke();
  ctx.strokeStyle = '#8a6a3e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(shortX, shortY);
  ctx.lineTo(longX, longY);
  ctx.stroke();

  // ===== Counterweight: steel drum full of concrete =====
  const cwHangLen = 38;
  const cwX = shortX;
  const cwY = shortY + cwHangLen;
  // Hanging chain — heavier links
  ctx.strokeStyle = '#2e2e2e';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(shortX, shortY);
  ctx.lineTo(cwX, cwY);
  ctx.stroke();
  // === Steel drum body — bigger, longer cylinder, weathered/dirty ===
  const bw = 46;   // half width (was 34)
  const bh = 90;   // total height (was 60)
  const top = cwY - 18;
  const bot = top + bh;
  // Body gradient: shadow → highlight → shadow (cylinder shading)
  const bodyGrad = ctx.createLinearGradient(cwX - bw, 0, cwX + bw, 0);
  bodyGrad.addColorStop(0, '#1f1f22');
  bodyGrad.addColorStop(0.35, '#4d4d52');
  bodyGrad.addColorStop(0.55, '#6d6d72');
  bodyGrad.addColorStop(0.8, '#3a3a3e');
  bodyGrad.addColorStop(1, '#15151a');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#0e0e12';
  ctx.lineWidth = 1.4;
  // Straight-sided drum with elliptical bottom curve (slightly rounded base)
  ctx.beginPath();
  ctx.moveTo(cwX - bw, top);
  ctx.lineTo(cwX - bw, bot - 2);
  ctx.quadraticCurveTo(cwX, bot + 4, cwX + bw, bot - 2);
  ctx.lineTo(cwX + bw, top);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Two pairs of rolled-steel hoops (typical 55-gallon drum profile)
  ctx.strokeStyle = '#0a0a0e';
  ctx.lineWidth = 4.5;
  const hoopRatios = [0.08, 0.18, 0.78, 0.92];
  for (const ratio of hoopRatios) {
    const hy = top + (bot - top) * ratio;
    ctx.beginPath();
    ctx.moveTo(cwX - bw, hy);
    ctx.lineTo(cwX + bw, hy);
    ctx.stroke();
  }
  // Hoop highlights
  ctx.strokeStyle = 'rgba(220, 220, 220, 0.32)';
  ctx.lineWidth = 1.2;
  for (const ratio of hoopRatios) {
    const hy = top + (bot - top) * ratio - 1.6;
    ctx.beginPath();
    ctx.moveTo(cwX - bw * 0.78, hy);
    ctx.lineTo(cwX - bw * 0.18, hy);
    ctx.stroke();
  }
  // Rust streaks running down the body
  ctx.strokeStyle = 'rgba(140, 70, 30, 0.5)';
  ctx.lineWidth = 1.4;
  const rustSpots = [-bw * 0.55, -bw * 0.1, bw * 0.3, bw * 0.65];
  for (const px of rustSpots) {
    ctx.beginPath();
    ctx.moveTo(cwX + px, top + 12);
    ctx.bezierCurveTo(
      cwX + px - 2, top + 22,
      cwX + px + 1, bot - 18,
      cwX + px - 1, bot - 8
    );
    ctx.stroke();
  }
  // Soot/scorch smudges (drum has been around)
  ctx.fillStyle = 'rgba(20, 18, 18, 0.55)';
  ctx.beginPath();
  ctx.ellipse(cwX - bw * 0.4, top + 24, 8, 14, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cwX + bw * 0.5, bot - 22, 6, 11, 0.3, 0, Math.PI * 2);
  ctx.fill();
  // === Concrete inside the open top ===
  const concreteGrad = ctx.createLinearGradient(cwX - bw, top, cwX + bw, top);
  concreteGrad.addColorStop(0, '#5a5550');
  concreteGrad.addColorStop(0.5, '#a8a39a');
  concreteGrad.addColorStop(1, '#403a35');
  ctx.fillStyle = concreteGrad;
  ctx.beginPath();
  ctx.ellipse(cwX, top, bw - 2, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2a2520';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // Aggregate / pebble texture in the concrete
  ctx.fillStyle = 'rgba(30, 28, 25, 0.65)';
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const rr = (bw - 4) * Math.sqrt(Math.random());
    ctx.beginPath();
    ctx.arc(cwX + Math.cos(a) * rr, top + Math.sin(a) * 4.2, 0.7 + Math.random() * 1.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(230, 224, 216, 0.45)';
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const rr = (bw - 4) * Math.sqrt(Math.random());
    ctx.beginPath();
    ctx.arc(cwX + Math.cos(a) * rr, top + Math.sin(a) * 4.2, 0.4 + Math.random() * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  // Inner shadow at the top rim (so the concrete reads as set INSIDE the drum)
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.ellipse(cwX, top - 0.5, bw - 2, 6.5, 0, Math.PI, Math.PI * 2);
  ctx.stroke();

  // ===== Birds perched on / arriving at the barrel =====
  for (const b of treb.birds) drawCrow(ctx, b);

  // ===== Sling + eyeball on long end =====
  // Sling = two ropes from the long-arm tip to a pouch holding the eyeball.
  // Cocking phase: pouch hangs straight down from the tip, but never
  // sinks below the ground line.
  // Releasing: pouch trails behind the tip and accelerates around with the arm,
  // staying tangent to the swing.
  const slingLen = g.longLen * 0.45;
  let pouchX, pouchY;
  if (treb.phase === 'releasing') {
    // Arm whips CW (theta decreasing). The sling lags behind in the swing,
    // so its angle is HIGHER than the arm (theta + lag). Lag shrinks as the
    // whip approaches release.
    const lag = (1 - treb.releaseT) * (Math.PI / 3);
    const trailTheta = theta + lag;
    pouchX = g.pivotX + Math.cos(trailTheta) * (g.longLen + slingLen);
    pouchY = g.pivotY - Math.sin(trailTheta) * (g.longLen + slingLen);
  } else {
    // Hang straight down from the tip, clamped to ground level.
    pouchX = longX;
    pouchY = Math.min(longY + slingLen, g.groundY - 14);
  }

  // Sling ropes
  ctx.strokeStyle = '#cc4444';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(longX - 4, longY);
  ctx.lineTo(pouchX - 6, pouchY - 4);
  ctx.moveTo(longX + 4, longY);
  ctx.lineTo(pouchX + 6, pouchY - 4);
  ctx.stroke();

  // Projectile in the sling pouch — whatever the user picked
  const eyeR = 38;
  ctx.save();
  ctx.translate(pouchX, pouchY);
  ctx.rotate(theta * 0.4);
  drawBall(ctx, eyeR, '#4d96ff', '#4d96ff', state.trebProjectile, 0, 0, 7, 0);
  ctx.restore();

}

function trebDrawFlight(ctx, g) {
  const eye = trebFlightScreenPos();

  // Distant horizon line (parallax — moves slowly with camera)
  ctx.strokeStyle = 'rgba(120, 90, 60, 0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, g.groundY - 1);
  ctx.lineTo(W, g.groundY - 1);
  ctx.stroke();

  // Distance ticks on the ground — small marks every 50 ft, bigger with
  // labels every 100 ft.
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5;
  ctx.font = '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let f = 50; f <= 3000; f += 50) {
    const x = trebWorldToScreenX(f);
    if (x < -40 || x > W + 40) continue;
    const big = f % 100 === 0;
    ctx.beginPath();
    ctx.moveTo(x, g.groundY);
    ctx.lineTo(x, g.groundY + (big ? 14 : 7));
    ctx.stroke();
    if (big) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText(`${f} mi`, x, g.groundY + 18);
    }
  }

  // LDS landmark silhouettes the eyeball flies over.
  // The Mayflower follows treb.shipFt while sailing so the ship moves westward.
  const tNow = performance.now() / 1000;
  for (const lm of TREB_LANDMARKS) {
    const ft = (lm.water && treb.sailing) ? treb.shipFt : lm.ft;
    const x = trebWorldToScreenX(ft);
    if (x < -260 || x > W + 260) continue;
    // Ships float on the water (slight Y offset); land landmarks sit on the ground.
    const drawY = lm.water ? g.groundY - 6 : g.groundY;
    lm.draw(ctx, x, drawY, tNow);
    // Tiny label tucked under the landmark
    ctx.font = '700 12px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(lm.label, x, g.groundY + 38);
  }

  // Shadow under the eyeball on the ground
  if (treb.phase === 'flying') {
    const groundShadowAlpha = Math.max(0.05, 0.45 - (g.groundY - eye.y) / 800);
    ctx.fillStyle = `rgba(0,0,0,${groundShadowAlpha})`;
    ctx.beginPath();
    ctx.ellipse(eye.x, g.groundY - 2, 78, 18, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // The flying projectile itself (rotates) — only drawn while in flight; once
  // it lands, the splat replaces the visible ball.
  if (treb.phase === 'flying') {
    ctx.save();
    ctx.translate(eye.x, eye.y);
    ctx.rotate(treb.rotation);
    drawBall(ctx, 76, '#4d96ff', '#4d96ff', state.trebProjectile, 0, 0, 7, 0);
    ctx.restore();
  }
  // (Sailing eyeball is now drawn as the cyclops's eye inside drawMayflower.)

  // Trail
  ctx.strokeStyle = 'rgba(220,220,255,0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 1; i <= 18; i++) {
    const t = i * 0.05;
    const tx = eye.x - treb.vx * TREB.PX_PER_FT * t;
    const ty = eye.y + treb.vy * TREB.PX_PER_FT * t + 0.5 * TREB.G_FT * TREB.PX_PER_FT * t * t;
    if (i === 1) ctx.moveTo(tx, ty); else ctx.lineTo(tx, ty);
  }
  ctx.stroke();
}

function trebDrawHUD(ctx, g) {
  ctx.textAlign = 'left';
